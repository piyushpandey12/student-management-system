<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Attendance</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

/* CONTAINER */
.container{
    width:420px;
    text-align:center;
    padding:40px;
    border-radius:20px;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.08);
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

/* TITLE */
h1{
    color:white;
    margin-bottom:10px;
}

p{
    color:#ddd;
    font-size:14px;
    margin-bottom:30px;
    line-height:1.5;
}

/* BUTTON */
.role-btn{
    display:block;
    width:100%;
    padding:18px;
    margin:20px 0;
    border:none;
    border-radius:40px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    color:white;
    letter-spacing:0.5px;
}

/* STUDENT */
.student{
    background:linear-gradient(135deg,#00c6ff,#0072ff);
}

/* TEACHER */
.teacher{
    background:linear-gradient(135deg,#ff416c,#ff4b2b);
}

.role-btn:hover{
    transform:scale(1.05);
}

/* INFO TEXT */
.note{
    margin-top:20px;
    font-size:12px;
    color:#ccc;
}
</style>
</head>

<body>

<div class="container">

    <h1>Smart Attendance System</h1>

    <p>
        Select your role to continue.  
        You will be redirected to signup if you are new,  
        or login if you already have an account.
    </p>

    <!-- STUDENT -->
    <button class="role-btn student" onclick="handleRole('student')">
        Continue as Student
    </button>

    <!-- TEACHER -->
    <button class="role-btn teacher" onclick="handleRole('teacher')">
        Continue as Teacher
    </button>

    <div class="note">
        Secure access • Role-based dashboard • Easy tracking
    </div>

</div>

<script>
// ================= SAFE PARSE =================
function getUser() {
    try {
        return JSON.parse(localStorage.getItem("user"));
    } catch {
        return null;
    }
}

// ================= CHECK TOKEN =================
const token = localStorage.getItem("token");
const user = getUser();

// 🔐 Redirect ONLY if valid session exists
if (token && user && user.role) {
    window.location.href =
        user.role === "teacher"
        ? "teacher-dashboard.html"
        : "student-dashboard.html";
}


// ================= ROLE HANDLER =================
function handleRole(role){

    // 🔥 Clear old session (prevents auto-login bug)
    localStorage.clear();

    // Save role for next page
    localStorage.setItem("role", role);

    // Redirect
    if(role === "teacher"){
        window.location.href = "teacher-signup.html";
    } else {
        window.location.href = "signup.html";
    }
}
</script>
</body>
</html>
