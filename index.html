<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Attendance</title>

<!-- GOOGLE FONT (for stylish title like your image) -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

/* CONTAINER */
.container{
    width:420px;
    text-align:center;
    padding:40px;
    border-radius:20px;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.08);
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

/* TITLE (Styled like modern UI) */
h1{
    color:white;
    font-size:32px;
    font-weight:800;
    letter-spacing:1px;
}

h1 span{
    display:block;
    font-size:18px;
    font-weight:300;
    color:#ddd;
    margin-top:5px;
}

/* TEXT */
p{
    color:#ddd;
    font-size:14px;
    margin:30px 0;
    line-height:1.6;
}

/* BUTTON */
.role-btn{
    display:block;
    width:100%;
    padding:18px;
    margin:20px 0;
    border:none;
    border-radius:40px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    color:white;
    letter-spacing:0.5px;
}

/* STUDENT */
.student{
    background:linear-gradient(135deg,#00c6ff,#0072ff);
}

/* TEACHER */
.teacher{
    background:linear-gradient(135deg,#ff416c,#ff4b2b);
}

.role-btn:hover{
    transform:scale(1.05);
}

/* NOTE */
.note{
    margin-top:20px;
    font-size:12px;
    color:#ccc;
}
</style>
</head>

<body>

<div class="container">

    <h1>
        Smart Attendance
        <span>System</span>
    </h1>

    <p>
        Select your role to continue.<br>
        New users will signup automatically,<br>
        existing users will login securely.
    </p>

    <!-- STUDENT -->
    <button class="role-btn student" onclick="handleRole('student')">
        Continue as Student
    </button>

    <!-- TEACHER -->
    <button class="role-btn teacher" onclick="handleRole('teacher')">
        Continue as Teacher
    </button>

    <div class="note">
        Secure • Role-based • Fast access
    </div>

</div>

<script>
// ================= SAFE USER PARSE =================
function getUser() {
    try {
        const data = localStorage.getItem("user");
        return data ? JSON.parse(data) : null;
    } catch {
        return null;
    }
}

// ================= SESSION VALIDATION =================
const token = localStorage.getItem("token");
const user = getUser();

// 🔒 STRICT VALIDATION
if (
    token &&
    typeof token === "string" &&
    token.length > 10 &&
    user &&
    (user.role === "student" || user.role === "teacher")
) {
    window.location.href =
        user.role === "teacher"
        ? "teacher-dashboard.html"
        : "student-dashboard.html";
}

// ================= ROLE HANDLER =================
function handleRole(role){

    // 🔥 Clear ONLY auth-related data (not everything)
    localStorage.removeItem("token");
    localStorage.removeItem("user");

    // Save role
    localStorage.setItem("role", role);

    // Redirect
    window.location.href =
        role === "teacher"
        ? "teacher-signup.html"
        : "signup.html";
}
</script>

</body>
</html>
