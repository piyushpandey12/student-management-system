<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Signup</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
body {
    height:100vh;
    background:linear-gradient(135deg,#1d2671,#c33764);
    display:flex;
    justify-content:center;
    align-items:center;
}
.container {
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    border-radius:15px;
    padding:40px;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    color:white;
    text-align:center;
}
.input-group { margin:15px 0; text-align:left; }
.input-group input {
    width:100%; padding:10px; border-radius:8px; border:none;
}
button {
    width:100%; padding:12px; border-radius:8px;
    border:none; background:#ff4b2b; color:white; cursor:pointer;
}
button:hover { background:#ff416c; }
.message { margin-top:10px; }
.link { margin-top:15px; }
.divider { margin:15px 0; text-align:center; }
.glass-google-btn {
    margin-top:10px;
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.3);
    backdrop-filter:blur(10px);
}
.glass-google-btn img { width:18px; margin-right:8px; }
</style>
</head>

<body>

<div class="container">
<h2>Student Registration</h2>

<form id="signupForm">
<div class="input-group">
<label>Roll Number</label>
<input type="text" id="rollno" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" required>
</div>

<button type="submit">Register</button>
</form>

<div class="divider">OR</div>

<div class="form-row" style="margin-top:10px;">

    <!-- Google Init -->
    <div id="g_id_onload"
        data-client_id="891518537612-l1frt7eo83cv9kaq03u1nv561j2jd003.apps.googleusercontent.com"
        data-callback="handleGoogleLogin"
        data-auto_prompt="false">
    </div>

    <!-- Custom Glass Button -->
    <button class="glass-google-btn" onclick="triggerGoogleLogin()">
        <img src="https://developers.google.com/identity/images/g-logo.png" />
        Continue with Google
    </button>

</div>

<div id="message" class="message"></div>

<div class="link">
Already have an account? <a href="login.html">Login</a>
</div>
</div>

<script type="module">

import { registerUser, loginUser } from "./js/api.js";

// 🔐 Redirect if already logged in
if (localStorage.getItem("token")) {
    window.location.href = "student-dashboard.html";
}

const msg = document.getElementById("message");

// ================= NORMAL SIGNUP =================
document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const rollno = document.getElementById("rollno").value.trim().toLowerCase();
    const password = document.getElementById("password").value.trim();

    if (!rollno || !password) {
        msg.innerText = "⚠️ All fields required";
        msg.style.color = "yellow";
        return;
    }

    try {
        msg.innerText = "⏳ Registering...";
        msg.style.color = "white";

        const res = await registerUser({
            identifier: rollno,
            password,
            role: "student"
        });

        if (res.status !== "success") {
            throw new Error(res.message);
        }

        const loginRes = await loginUser({
            identifier: rollno,
            password
        });

        if (loginRes.status === "success") {

            // ✅ FIX: STORE TOKEN (MAIN BUG FIX)
            const token = loginRes.token || loginRes.data?.token;
            const user = loginRes.user || loginRes.data?.user;

            if (!token) throw new Error("Token not received from server");

            localStorage.setItem("token", token);
            localStorage.setItem("user", JSON.stringify(user));

            msg.innerText = "✅ Registered & Logged in!";
            msg.style.color = "lightgreen";

            setTimeout(() => {
                window.location.href = "student-dashboard.html";
            }, 1000);
        }

    } catch (err) {
        msg.innerText = "❌ " + err.message;
        msg.style.color = "red";
    }
});


// ================= GOOGLE INIT =================
let googleInitialized = false;

function initGoogle() {
    if (googleInitialized) return;

    if (window.google && google.accounts && google.accounts.id) {
        google.accounts.id.initialize({
            client_id: "891518537612-l1frt7eo83cv9kaq03u1nv561j2jd003.apps.googleusercontent.com",
            callback: handleGoogleSignup
        });
        googleInitialized = true;
    } else {
        setTimeout(initGoogle, 500);
    }
}

document.addEventListener("DOMContentLoaded", initGoogle);


// ================= GOOGLE TRIGGER =================
window.triggerGoogleSignup = function () {
    google.accounts.id.prompt();
};


// ================= GOOGLE SIGNUP =================
window.handleGoogleSignup = async function (response) {
    try {
        msg.innerText = "⏳ Signing up with Google...";
        msg.style.color = "white";

        const res = await fetch(
            "https://student-management-system-api-cznx.onrender.com/api/auth/google-signup",
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    token: response.credential,
                    role: "student"
                })
            }
        );

        const data = await res.json();

        if (!data || data.error) {
            throw new Error(data.error || "Google signup failed");
        }

        // ✅ SAFE TOKEN STORE
        const token = data.token || data.data?.token;
        const user = data.user || data.data?.user;

        if (!token) throw new Error("Token not received");

        localStorage.setItem("token", token);
        localStorage.setItem("user", JSON.stringify(user));

        msg.innerText = "✅ Google Signup Successful!";
        msg.style.color = "lightgreen";

        setTimeout(() => {
            window.location.href = "student-dashboard.html";
        }, 1000);

    } catch (err) {
        msg.innerText = "❌ " + err.message;
        msg.style.color = "red";
    }
};

</script>

</body>
</html>
