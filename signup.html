<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Signup</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #1d2671, #c33764);
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 15px;
    padding: 40px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    color: white;
    text-align: center;
}

.input-group {
    margin: 15px 0;
    text-align: left;
}

.input-group input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #ff4b2b;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #ff416c;
}

.message {
    margin-top: 10px;
}

.link {
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Student Registration</h2>

    <!-- ✅ ONLY FORM SUBMIT -->
    <form id="signupForm">
        <div class="input-group">
            <label>Roll Number</label>
            <input type="text" id="rollno" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>

        <!-- ❌ REMOVE onclick -->
        <button type="submit">Register</button>
    </form>

    <div id="message" class="message"></div>

    <div class="link">
        Already have an account? <a href="login.html">Login</a>
    </div>
</div>


<!-- ✅ MODULE SCRIPT -->
<script type="module">

import { registerUser, loginUser } from "./js/api.js";

// 🔐 Redirect if logged in
if (localStorage.getItem("token")) {
    window.location.href = "student-dashboard.html";
}


// ================= SIGNUP =================
document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const rollno = document.getElementById("rollno").value.trim().toLowerCase();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("message");

    if (!rollno || !password) {
        msg.innerText = "⚠️ All fields required";
        msg.style.color = "yellow";
        return;
    }

    try {
        msg.innerText = "⏳ Registering...";
        msg.style.color = "white";

        // ✅ REGISTER
        const res = await registerUser({
            identifier: rollno,
            password,
            role: "student"
        });

        if (res.status !== "success") {
            throw new Error(res.message || "Registration failed");
        }

        // ✅ LOGIN
        const loginRes = await loginUser({
            identifier: rollno,
            password
        });

        if (loginRes.status === "success") {

            msg.innerText = "✅ Registered & Logged in!";
            msg.style.color = "lightgreen";

            setTimeout(() => {
                window.location.href = "student-dashboard.html";
            }, 1000);

        } else {
            throw new Error("Login failed");
        }

    } catch (err) {
        msg.innerText = "❌ " + err.message;
        msg.style.color = "red";
    }
});

</script>

</body>
</html>
