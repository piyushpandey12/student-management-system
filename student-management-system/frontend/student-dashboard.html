<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
    background: linear-gradient(135deg,#667eea,#764ba2,#00c6ff);
    color:#fff;
}

.container{display:flex}

/* SIDEBAR */
.sidebar{
    width:240px;
    height:100vh;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:25px;
}

.sidebar h2{margin-bottom:30px}

.sidebar button{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.12);
    color:#fff;
    cursor:pointer;
}

/* MAIN */
.main{flex:1;padding:25px}

.nav{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

.card{
    padding:20px;
    border-radius:15px;
    background:rgba(255,255,255,0.1);
}

/* CHARTS */
.charts{
    display:flex;
    gap:30px;
    margin-top:20px;
}

canvas{
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:15px;
}

/* TABLE */
table{width:100%;margin-top:20px}
td,th{padding:10px;text-align:left}

/* CALENDAR */
#calendar {
    margin-top: 15px;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
}

.day {
    padding: 10px;
    text-align: center;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    cursor: pointer;
    position: relative;
}

.present { background: #00ff88; color:black }
.absent { background: #ff4d4d }

.day:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 110%;
    left: 50%;
    transform: translateX(-50%);
    background: black;
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Student</h2>
    <button onclick="show('dashboard')">Dashboard</button>
    <button onclick="show('marks')">Marks</button>
    <button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="nav">
    <h2 id="welcome">Welcome</h2>
</div>

<!-- CARDS -->
<div class="cards">
    <div class="card">Attendance %<br><b id="att">0%</b></div>
    <div class="card">Present Days<br><b id="present">0</b></div>
    <div class="card">Total Days<br><b id="total">0</b></div>
    <div class="card">🔥 Streak<br><b id="streak">0</b></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">

<div class="charts">
    <canvas id="attendanceChart"></canvas>
    <canvas id="marksChart"></canvas>
</div>

<!-- WEEKLY -->
<canvas id="weeklyChart" style="margin-top:20px;"></canvas>

<!-- CALENDAR -->
<div class="section">
    <h3>
        Attendance Calendar 
        <button onclick="prevMonth()">⬅</button>
        <span id="monthLabel"></span>
        <button onclick="nextMonth()">➡</button>
    </h3>
    <div id="calendar"></div>
</div>

</div>

<!-- MARKS -->
<div id="marks" class="section" style="display:none">
<h3>Marks</h3>
<table>
<tr><th>Subject</th><th>Marks</th></tr>
<tbody id="marksList"></tbody>
</table>
</div>

</div>
</div>

<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
background:rgba(0,0,0,0.6); justify-content:center; align-items:center;">
<div style="background:white; color:black; padding:20px; border-radius:10px;">
    <h3>Attendance Details</h3>
    <p id="modalText"></p>
    <button onclick="closeModal()">Close</button>
</div>
</div>

<script>
const BASE_URL = "https://student-management-backend-if04.onrender.com/api";

const user = JSON.parse(localStorage.getItem("user"));
if (!user) window.location.href = "login.html";

document.getElementById("welcome").innerText = "Welcome " + user.rollno;

let weeklyChartInstance = null;

// ================= DASHBOARD =================
async function loadDashboard(){
    const res = await fetch(`${BASE_URL}/students/dashboard/${user.rollno}`);
    const data = await res.json();

    document.getElementById("att").innerText = data.attendance_percent + "%";
    document.getElementById("present").innerText = data.present_days;
    document.getElementById("total").innerText = data.total_days;

    document.getElementById("marksList").innerHTML =
        data.marks.map(m=>`<tr><td>${m.subject}</td><td>${m.marks}</td></tr>`).join("");

    drawCharts(data);
}

// ================= CHARTS =================
function drawCharts(data){

    new Chart(document.getElementById("attendanceChart"), {
        type: 'pie',
        data: {
            labels: ['Present','Absent'],
            datasets: [{ data:[data.present_days, data.total_days - data.present_days] }]
        }
    });

    new Chart(document.getElementById("marksChart"), {
        type:'bar',
        data:{
            labels:data.marks.map(m=>m.subject),
            datasets:[{label:'Marks',data:data.marks.map(m=>m.marks)}]
        }
    });
}

// ================= CALENDAR =================
let currentDate = new Date();

async function loadCalendar(){
    const res = await fetch(`${BASE_URL}/attendance/${user.rollno}`);
    const data = await res.json();

    const map={};
    data.forEach(d=>map[d.date]=d.status);

    const calendar=document.getElementById("calendar");
    calendar.innerHTML="";

    const y=currentDate.getFullYear();
    const m=currentDate.getMonth();

    document.getElementById("monthLabel").innerText =
        currentDate.toLocaleString('default',{month:'long',year:'numeric'});

    const days=new Date(y,m+1,0).getDate();

    for(let i=1;i<=days;i++){
        const dStr=`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
        const div=document.createElement("div");

        div.className="day";
        div.innerText=i;

        let status=map[dStr]||"no data";

        if(status==="present") div.classList.add("present");
        if(status==="absent") div.classList.add("absent");

        div.setAttribute("data-tooltip",`${dStr} → ${status}`);

        div.onclick=()=>{
            document.getElementById("modalText").innerText =
                `Date: ${dStr}\nStatus: ${status}`;
            document.getElementById("modal").style.display="flex";
        };

        calendar.appendChild(div);
    }

    drawWeeklyChart(data);
    calculateStreak(data);
}

// ================= MODAL =================
function closeModal(){
    document.getElementById("modal").style.display="none";
}

// ================= WEEKLY =================
function drawWeeklyChart(data){

    const week={Mon:0,Tue:0,Wed:0,Thu:0,Fri:0,Sat:0,Sun:0};

    data.forEach(d=>{
        const day=new Date(d.date).toLocaleString('en-US',{weekday:'short'});
        if(d.status==="present") week[day]++;
    });

    if(weeklyChartInstance) weeklyChartInstance.destroy();

    weeklyChartInstance=new Chart(document.getElementById("weeklyChart"),{
        type:'bar',
        data:{
            labels:Object.keys(week),
            datasets:[{label:'Weekly',data:Object.values(week)}]
        }
    });
}

// ================= STREAK =================
function calculateStreak(data){

    let streak=0;

    const sorted=data.filter(d=>d.status==="present")
        .map(d=>d.date).sort().reverse();

    let prev=new Date();

    for(let d of sorted){
        let diff=(prev-new Date(d))/(1000*60*60*24);
        if(diff<=1){streak++;prev=new Date(d);} else break;
    }

    document.getElementById("streak").innerText=streak;
}

// ================= NAV =================
function show(id){
    document.getElementById("dashboard").style.display=id==="dashboard"?"block":"none";
    document.getElementById("marks").style.display=id==="marks"?"block":"none";
}

function logout(){
    localStorage.removeItem("user");
    window.location.href="login.html";
}

function nextMonth(){ currentDate.setMonth(currentDate.getMonth()+1); loadCalendar(); }
function prevMonth(){ currentDate.setMonth(currentDate.getMonth()-1); loadCalendar(); }

// INIT
loadDashboard();
loadCalendar();
</script>

</body>
</html>
