<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Attendance System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#667eea,#764ba2,#00c6ff,#0072ff);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
    color:white;
}

/* ANIMATION */
@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* MAIN */
.container{
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.08);
    border-radius:25px;
    padding:40px;
    width:600px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

/* TITLE */
h1{margin-bottom:10px;}
p{opacity:0.8;margin-bottom:25px;}

/* CARDS */
.roles{
    display:flex;
    justify-content:center;
    gap:25px;
}

/* FLIP CARD */
.flip-card{
    width:200px;
    height:240px;
    perspective:1000px;
}

.flip-inner{
    position:relative;
    width:100%;
    height:100%;
    transition:0.6s;
    transform-style:preserve-3d;
}

.flip-card:hover .flip-inner{
    transform:rotateY(180deg);
}

.flip-front,.flip-back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:20px;
    backface-visibility:hidden;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* FRONT */
.flip-front{
    background:rgba(255,255,255,0.12);
}

/* BACK */
.flip-back{
    background:rgba(0,0,0,0.7);
    transform:rotateY(180deg);
}

/* ICON */
.icon{font-size:50px;}

/* BUTTON */
.btn{
    margin:5px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#ff4b2b,#ff416c);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* GOOGLE */
.google{
    background:white;
    color:black;
}

/* BADGE */
.badge{
    background:#ffcc00;
    color:black;
    padding:3px 8px;
    border-radius:8px;
    font-size:12px;
    margin-top:5px;
}

/* PROFILE */
.profile{
    position:absolute;
    top:20px;
    right:20px;
    display:flex;
    gap:10px;
    align-items:center;
}

.profile img{
    width:40px;
    height:40px;
    border-radius:50%;
}

.logout{
    font-size:12px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- PROFILE -->
<div class="profile" id="profileBox" style="display:none;">
    <img id="profileImg">
    <div>
        <div id="profileName"></div>
        <div class="logout" onclick="logout()">Logout</div>
    </div>
</div>

<div class="container">

<h1>📅 Smart Attendance System</h1>
<p>Track attendance, analytics & performance</p>

<div class="roles">

<!-- STUDENT -->
<div class="flip-card">
<div class="flip-inner">

<div class="flip-front">
<div class="icon">🎓</div>
<h3>Student</h3>
</div>

<div class="flip-back">
<button class="btn" onclick="goLogin('student')">Login</button>
<button class="btn" onclick="goSignup('student')">Signup</button>
<button class="btn google" onclick="googleLogin()">Google</button>
</div>

</div>
</div>

<!-- TEACHER -->
<div class="flip-card">
<div class="flip-inner">

<div class="flip-front">
<div class="icon">👨‍🏫</div>
<h3>Teacher</h3>
<div class="badge">Approval Required</div>
</div>

<div class="flip-back">
<button class="btn" onclick="goLogin('teacher')">Login</button>
<button class="btn" onclick="goSignup('teacher')">Signup</button>
<button class="btn google" onclick="googleLogin()">Google</button>
</div>

</div>
</div>

</div>

</div>

<script>
// ================= BASE URL =================
const BASE_URL =
  window.location.hostname === "localhost"
    ? "http://127.0.0.1:5000/api"
    : "https://student-management-backend-if04.onrender.com/api";

// ================= USER CHECK =================
const user = JSON.parse(localStorage.getItem("user"));

if(user){
    document.getElementById("profileBox").style.display="flex";
    document.getElementById("profileName").innerText=user.rollno;
    document.getElementById("profileImg").src=user.photo || "https://i.pravatar.cc/150";

    if(user.role==="teacher"){
        window.location.href="teacher-dashboard.html";
    } else {
        window.location.href="student-dashboard.html";
    }
}

// ================= NAV =================
function goLogin(role){
    localStorage.setItem("role",role);
    window.location.href="login.html";
}

function goSignup(role){
    localStorage.setItem("role",role);
    window.location.href="signup.html";
}

// ================= GOOGLE LOGIN (REAL) =================
function googleLogin(){
    window.location.href = `${BASE_URL}/auth/google`;
}

// ================= LOGOUT =================
function logout(){
    localStorage.removeItem("user");
    location.reload();
}

// ================= BACKEND CHECK =================
fetch(`${BASE_URL}/test`)
.then(()=>console.log("✅ Backend Connected"))
.catch(()=>console.log("⚠️ Backend Offline"));
</script>

</body>
</html>
