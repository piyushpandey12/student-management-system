<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Attendance System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(-45deg, #667eea, #764ba2, #00c6ff, #0072ff);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    backdrop-filter: blur(20px);
    background: rgba(255, 255, 255, 0.1);
    padding: 50px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
    width: 420px;
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

h1 {
    font-size: 30px;
    font-weight: 700;
    margin-bottom: 15px;
}

p {
    font-size: 15px;
    margin-bottom: 25px;
    opacity: 0.9;
}

.role {
    font-size: 13px;
    opacity: 0.7;
    margin-bottom: 20px;
}

.btn {
    padding: 12px 30px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: translateY(-3px) scale(1.05);
}

.btn:active {
    transform: scale(0.95);
}
</style>
</head>

<body>

<div class="container">
    <h1>📅 Student Attendance System</h1>

    <p>
        Track attendance, monitor performance,
        and manage student records efficiently
    </p>

    <div class="role">
        Login as Admin or Student using Roll Number
    </div>

    <!-- ✅ FIXED BUTTON -->
    <button class="btn" onclick="goNext()">Get Started</button>
</div>

<script>
// ================= BASE URL =================
const BASE_URL =
  window.location.hostname === "127.0.0.1" ||
  window.location.hostname === "localhost"
    ? "http://127.0.0.1:5000/api"
    : "https://student-management-backend-if04.onrender.com/api";
// ================= AUTO REDIRECT =================
if (localStorage.getItem("user")) {
    window.location.href = "dashboard.html";
}

// ================= NAVIGATION =================
function goNext() {
    const user = localStorage.getItem("user");

    if (user) {
        window.location.href = "dashboard.html";
    } else {
        window.location.href = "signup.html";
    }
}

// ================= BACKEND CHECK =================
async function checkBackend() {
    try {
        const res = await fetch(`${BASE_URL}/test`);

        if (!res.ok) throw new Error();

        console.log("✅ Backend connected");

    } catch (err) {
        console.warn("⚠️ Backend not reachable");
    }
}

checkBackend();
</script>

</body>
</html>
