<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Attendance System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(-45deg, #667eea, #764ba2, #00c6ff, #0072ff);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Background animation */
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Glass container */
.container {
    backdrop-filter: blur(20px);
    background: rgba(255, 255, 255, 0.1);
    padding: 50px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    width: 420px;
    animation: float 4s ease-in-out infinite;
}

/* Floating animation */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

/* Title */
h1 {
    font-size: 30px;
    font-weight: 700;
    margin-bottom: 15px;
    text-shadow: 0 0 12px rgba(255,255,255,0.8);
}

/* Subtitle */
p {
    font-size: 15px;
    margin-bottom: 25px;
    opacity: 0.9;
}

/* Role hint */
.role {
    font-size: 13px;
    opacity: 0.7;
    margin-bottom: 20px;
}

/* Button */
.btn {
    padding: 12px 30px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* Hover */
.btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* Click */
.btn:active {
    transform: scale(0.95);
}
</style>
</head>

<body>

<div class="container">
    <h1>📅 Student Attendance System</h1>
    
    <p>
        Track attendance, monitor performance,  
        and manage student records efficiently
    </p>

    <div class="role">
        Login as Admin or Student using Roll Number
    </div>

    <a href="login.html">
        <button class="btn">Login Now</button>
    </a>
</div>

</body>
</html>
