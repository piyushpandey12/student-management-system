<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
    background: linear-gradient(135deg,#667eea,#764ba2,#00c6ff);
    color:#fff;
}

.container{display:flex}

/* SIDEBAR */
.sidebar{
    width:240px;
    height:100vh;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:25px;
}

.sidebar h2{margin-bottom:30px}

.sidebar button{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.12);
    color:#fff;
    cursor:pointer;
}

.sidebar button:hover{
    transform:translateX(6px);
    background:rgba(255,255,255,0.25);
}

/* MAIN */
.main{flex:1;padding:25px}

.nav{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

.card{
    padding:20px;
    border-radius:15px;
    background:rgba(255,255,255,0.1);
}

/* SECTION */
.section{margin-top:25px}

/* INPUT */
input{
    padding:10px;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.1);
    color:#fff;
    margin:5px;
}

/* BUTTON */
.btn{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#00c6ff;
    color:#fff;
    cursor:pointer;
}

/* TABLE */
table{width:100%;margin-top:15px}
td,th{padding:10px}

/* MODAL */
.modal{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#222;
    padding:20px;
    border-radius:10px;
}

/* ANALYTICS */
.charts{
    display:flex;
    gap:30px;
    margin-top:20px;
}

canvas{
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:15px;
}

.insights{
    margin-top:20px;
    padding:20px;
    background:rgba(255,255,255,0.1);
    border-radius:15px;
}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Attendance</h2>
    <button onclick="show('students')">Students</button>
    <button onclick="show('analytics')">Analytics</button>
    <button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="nav">
    <h2>Welcome Admin</h2>
    <button class="btn" onclick="openModal()">+ Add Student</button>
</div>

<!-- CARDS -->
<div class="cards">
    <div class="card">Students<br><b id="total">0</b></div>
    <div class="card">Attendance %<br><b id="att">0%</b></div>
    <div class="card">Avg Marks<br><b id="marks">0</b></div>
    <div class="card">Top Score<br><b id="top">0</b></div>
</div>

<!-- STUDENTS -->
<div id="students" class="section">
<input id="search" placeholder="Search..." onkeyup="search()">

<table>
<tr>
<th>Name</th>
<th>Roll No</th>
<th>Attendance</th>
<th>Marks</th>
<th>Action</th>
</tr>
<tbody id="list"></tbody>
</table>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="section" style="display:none">

<h2>Analytics Dashboard</h2>

<div class="charts">
    <canvas id="attendanceChart"></canvas>
    <canvas id="marksChart"></canvas>
</div>

<div class="insights">
    <h3>Insights</h3>
    <p id="insightText"></p>
</div>

</div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3>Add Student</h3>
<input id="name" placeholder="Name"><br>
<input id="roll" placeholder="Roll No"><br>
<input id="marksInput" placeholder="Marks"><br>
<button class="btn" onclick="add()">Save</button>
</div>
</div>

<script>
// ================= BASE URL =================
const BASE_URL =
  window.location.hostname === "127.0.0.1"
    ? "http://127.0.0.1:5000"
    : "https://student-backend.onrender.com";

// 🔐 LOGIN PROTECTION
const user = localStorage.getItem("user");
if (!user) window.location.href = "login.html";

let students = [];
let attendanceChart, marksChart;

// ================= LOAD FROM DB =================
async function loadStudents(){
    try{
        const res = await fetch(`${BASE_URL}/students`);
        const data = await res.json();

        students = data.map(s => ({
            name: s.name,
            roll: s.roll,
            marks: s.marks || 0,
            attendance: s.attendance || false
        }));

        update();

    }catch(err){
        console.error(err);
    }
}

// ================= ADD =================
async function add(){
    let name=nameEl("name");
    let roll=nameEl("roll");
    let marks=Number(nameEl("marksInput"));

    try{
        await fetch(`${BASE_URL}/students`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({name, roll, marks})
        });

        closeModal();
        loadStudents();

    }catch(err){
        console.error(err);
    }
}

// ================= UPDATE =================
function update(){
let list=document.getElementById("list");
list.innerHTML="";

let totalMarks=0,top=0,present=0;

students.forEach((s,i)=>{
totalMarks+=s.marks;
if(s.marks>top)top=s.marks;
if(s.attendance)present++;

list.innerHTML+=`
<tr>
<td>${s.name}</td>
<td>${s.roll}</td>
<td>
<input type="checkbox" ${s.attendance?"checked":""}
onchange="toggleAttendance(${i})">
</td>
<td>
<input type="number" value="${s.marks}" onchange="updateMarks(${i},this.value)">
</td>
<td><button onclick="del(${i})">Delete</button></td>
</tr>`;
});

let total=students.length;
let avg=total?Math.round(totalMarks/total):0;
let att=total?Math.round((present/total)*100):0;

document.getElementById("total").innerText=total;
document.getElementById("marks").innerText=avg;
document.getElementById("top").innerText=top;
document.getElementById("att").innerText=att+"%";

drawCharts(att,avg,top);
generateInsights(total,att,avg,top);
}

// ================= DELETE =================
async function del(i){
    const student = students[i];

    await fetch(`${BASE_URL}/students/${student.roll}`, {
        method: "DELETE"
    });

    loadStudents();
}

// ================= CHARTS =================
function drawCharts(att,avg,top){

if(attendanceChart) attendanceChart.destroy();
if(marksChart) marksChart.destroy();

attendanceChart=new Chart(document.getElementById("attendanceChart"),{
type:"pie",
data:{
labels:["Present","Absent"],
datasets:[{data:[att,100-att],backgroundColor:["#00ff88","#ff4d4d"]}]
}
});

marksChart=new Chart(document.getElementById("marksChart"),{
type:"bar",
data:{
labels:["Average","Top"],
datasets:[{data:[avg,top],backgroundColor:["#4facfe","#00f2fe"]}]
}
});
}

// ================= INSIGHTS =================
function generateInsights(total,att,avg,top){
let text=`Total Students: ${total}. `;

text+=att>75?"Excellent attendance 👍. ":
att>50?"Average attendance ⚠️. ":"Low attendance ❌. ";

text+=avg>75?"Great performance 📈. ":
avg>40?"Moderate ⚠️. ":"Poor ❌. ";

text+=`Top score: ${top}`;

document.getElementById("insightText").innerText=text;
}

// ================= HELPERS =================
function toggleAttendance(i){
    students[i].attendance=!students[i].attendance;
    update();
}

function updateMarks(i,val){
    students[i].marks=Number(val);
    update();
}

function search(){
let val=document.getElementById("search").value.toLowerCase();
document.querySelectorAll("#list tr").forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(val)?"":"none";
});
}

function show(id){
document.getElementById("students").style.display=id==="students"?"block":"none";
document.getElementById("analytics").style.display=id==="analytics"?"block":"none";
}

function openModal(){document.getElementById("modal").style.display="flex";}
function closeModal(){document.getElementById("modal").style.display="none";}

function logout(){
    localStorage.removeItem("user");
    window.location.href="login.html";
}

function nameEl(id){return document.getElementById(id).value.trim();}

// ================= INIT =================
loadStudents();
</script>

</body>
</html>
