<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Signup</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #1d2671, #c33764);
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 15px;
    padding: 40px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    color: white;
    text-align: center;
}

.container h2 {
    margin-bottom: 20px;
}

.input-group {
    margin: 15px 0;
    text-align: left;
}

.input-group input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: none;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #ff4b2b;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #ff416c;
}

.link {
    margin-top: 15px;
    font-size: 14px;
}

.message {
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Student Registration</h2>

    <form id="signupForm">
        <div class="input-group">
            <label>Roll Number</label>
            <input type="text" name="rollno" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit">Register</button>
    </form>

    <div class="message" id="message"></div>

    <div class="link">
        Already have an account? <a href="login.html">Login</a>
    </div>
</div>

<script>
// ================= BASE URL =================
const BASE_URL =
    window.location.hostname === "127.0.0.1" ||
    window.location.hostname === "localhost"
        ? "http://127.0.0.1:5000"
        : "https://student-backend.onrender.com";

// ================= AUTO REDIRECT (SMART UX) =================
if (localStorage.getItem("user")) {
    window.location.href = "dashboard.html";
}

// ================= SIGNUP =================
document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const rollno = e.target.rollno.value.trim();
    const password = e.target.password.value.trim();
    const messageEl = document.getElementById("message");

    // ✅ validation
    if (!rollno || !password) {
        messageEl.innerText = "All fields are required!";
        messageEl.style.color = "yellow";
        return;
    }

    if (password.length < 4) {
        messageEl.innerText = "Password must be at least 4 characters";
        messageEl.style.color = "orange";
        return;
    }

    try {
        const res = await fetch(`${BASE_URL}/auth/register`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ rollno, password })
        });

        const data = await res.json();

        if (res.ok) {
            messageEl.innerText = "✅ Registered successfully! Redirecting...";
            messageEl.style.color = "lightgreen";

            // ✅ clear form
            e.target.reset();

            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);

        } else {
            messageEl.innerText = "❌ " + (data.error || data.message || "Signup failed");
            messageEl.style.color = "red";
        }

    } catch (err) {
        console.error(err);
        messageEl.innerText = "⚠️ Server error!";
        messageEl.style.color = "orange";
    }
});
</script>

</body>
</html>
