<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Signup</title>

<style>
/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* ===== BODY ===== */
body {
    height: 100vh;
    background: linear-gradient(135deg, #1d2671, #c33764);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ===== CARD ===== */
.container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 15px;
    padding: 40px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    color: white;
    text-align: center;
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* ===== TITLE ===== */
.container h2 {
    margin-bottom: 20px;
}

/* ===== INPUT ===== */
.input-group {
    margin: 15px 0;
    text-align: left;
}

.input-group label {
    font-size: 14px;
}

.input-group input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: none;
    border-radius: 8px;
    outline: none;
}

/* ===== BUTTON ===== */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #ff4b2b;
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 15px;
    transition: 0.3s;
}

button:hover {
    background: #ff416c;
    transform: scale(1.05);
}

/* ===== LINK ===== */
.link {
    margin-top: 15px;
    font-size: 14px;
}

.link a {
    color: #ffd;
    text-decoration: none;
}

/* ===== MESSAGE ===== */
.message {
    margin-top: 10px;
    font-size: 14px;
}
</style>

</head>
<body>

<div class="container">
    <h2>Student Registration</h2>

    <form id="signupForm">
        <div class="input-group">
            <label>Roll Number</label>
            <input type="text" name="rollno" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit">Register</button>
    </form>

    <div class="message" id="message"></div>

    <div class="link">
        Already have an account? <a href="login.html">Login</a>
    </div>
</div>

<script>
// ================= BASE URL =================
const BASE_URL =
    window.location.hostname === "127.0.0.1" ||
    window.location.hostname === "localhost"
        ? "http://127.0.0.1:5000"
        : "https://student-backend.onrender.com";

// ================= SIGNUP =================
document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const rollno = e.target.rollno.value.trim();
    const password = e.target.password.value.trim();
    const messageEl = document.getElementById("message");

    if (!rollno || !password) {
        messageEl.innerText = "All fields are required!";
        messageEl.style.color = "yellow";
        return;
    }

    try {
        const res = await fetch(`${BASE_URL}/register`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ rollno, password })
        });

        const data = await res.json();

        if (res.ok) {
            messageEl.innerText = "✅ Registered successfully! Redirecting...";
            messageEl.style.color = "lightgreen";

            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);

        } else {
            messageEl.innerText = "❌ " + (data.error || "Registration failed");
            messageEl.style.color = "red";
        }

    } catch (err) {
        messageEl.innerText = "⚠️ Server error!";
        messageEl.style.color = "orange";
    }
});
</script>

</body>
</html>
