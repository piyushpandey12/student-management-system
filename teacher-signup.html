<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Signup</title>

<!-- ✅ Google Script -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#1d2671,#c33764);
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    border-radius:15px;
    padding:40px;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    color:white;
    text-align:center;
}

.input-group{
    margin:15px 0;
    text-align:left;
}

.input-group input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#ff4b2b;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#ff416c;
}

.message{
    margin-top:10px;
}

.link{
    margin-top:15px;
}

/* Divider */
.divider{
    margin:15px 0;
}

/* Google Button */
.glass-google-btn{
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.3);
}
.glass-google-btn img{
    width:18px;
    margin-right:8px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Teacher Registration</h2>

    <!-- ================= NORMAL SIGNUP ================= -->
    <form id="signupForm">
        <div class="input-group">
            <label>Teacher ID</label>
            <input type="text" id="teacherId" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit">Register</button>
    </form>

    <!-- ================= GOOGLE SIGNUP ================= -->
    <div class="divider">OR</div>

 <div class="form-row" style="margin-top:10px;">

    <!-- Google Init -->
    <div id="g_id_onload"
        data-client_id="891518537612-l1frt7eo83cv9kaq03u1nv561j2jd003.apps.googleusercontent.com"
        data-callback="handleGoogleLogin"
        data-auto_prompt="false">
    </div>

    <!-- Custom Glass Button -->
    <button class="glass-google-btn" onclick="triggerGoogleLogin()">
        <img src="https://developers.google.com/identity/images/g-logo.png" />
        Continue with Google
    </button>

</div>

    <div id="message" class="message"></div>

    <div class="link">
        Already have an account? <a href="teacher-login.html">Login</a>
    </div>
</div>


<script type="module">

import { registerUser, loginUser, googleAuth } from "./js/api.js";

const msg = document.getElementById("message");

// ================= REDIRECT =================
if (localStorage.getItem("token")) {
    window.location.href = "teacher-dashboard.html";
}


// ================= NORMAL SIGNUP =================
document.getElementById("signupForm").addEventListener("submit", async (e)=>{
    e.preventDefault();

    const teacherId = document.getElementById("teacherId").value.trim().toLowerCase();
    const password = document.getElementById("password").value.trim();

    if(!teacherId || !password){
        msg.innerText = "⚠️ All fields required";
        msg.style.color = "yellow";
        return;
    }

    try{
        msg.innerText = "⏳ Registering...";
        msg.style.color = "white";

        await registerUser({
            identifier: teacherId,
            password,
            role: "teacher"
        });

        const loginRes = await loginUser({
            identifier: teacherId,
            password
        });

        localStorage.setItem("token", loginRes.token);
        localStorage.setItem("user", JSON.stringify(loginRes.user));

        msg.innerText = "✅ Registered & Logged in!";
        msg.style.color = "lightgreen";

        setTimeout(()=>{
            window.location.href = "teacher-dashboard.html";
        },1000);

    }catch(err){
        msg.innerText = "❌ " + err.message;
        msg.style.color = "red";
    }
});


// ================= GOOGLE INIT =================
function initGoogle(){
    if(window.google && google.accounts && google.accounts.id){
        google.accounts.id.initialize({
            client_id: "891518537612-l1frt7eo83cv9kaq03u1nv561j2jd003.apps.googleusercontent.com",
            callback: handleGoogleLogin
        });
    }else{
        setTimeout(initGoogle,500);
    }
}
document.addEventListener("DOMContentLoaded", initGoogle);


// ================= GOOGLE BUTTON =================
window.triggerGoogleLogin = function(){
    google.accounts.id.prompt();
};


// ================= GOOGLE SIGNUP =================
window.handleGoogleLogin = async function(response){
    try{
        msg.innerText = "⏳ Signing up with Google...";
        msg.style.color = "white";

        await googleAuth(response.credential, "teacher");

        msg.innerText = "✅ Google Signup Successful!";
        msg.style.color = "lightgreen";

        setTimeout(()=>{
            window.location.href = "teacher-dashboard.html";
        },1000);

    }catch(err){
        msg.innerText = "❌ " + err.message;
        msg.style.color = "red";
    }
};
</script>

</body>
</html>
