<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Signup</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{
    height:100vh;
    background:linear-gradient(135deg,#1d2671,#c33764);
    display:flex;
    justify-content:center;
    align-items:center;
}
.container{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    border-radius:15px;
    padding:40px;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    color:white;
    text-align:center;
}
.input-group{margin:15px 0;text-align:left;}
.input-group input{
    width:100%;padding:10px;border:none;border-radius:8px;
}
button{
    width:100%;padding:12px;border:none;border-radius:8px;
    background:#ff4b2b;color:white;cursor:pointer;
}
button:hover{background:#ff416c;}
.message{margin-top:10px;}
.link{margin-top:15px;}
</style>
</head>

<body>

<div class="container">
    <h2>Teacher Registration</h2>

    <form id="signupForm">
        <div class="input-group">
            <label>Teacher ID</label>
            <input type="text" id="teacherId" required>
        </div>

        <div class="input-group">
            <label>Name</label>
            <input type="text" id="name" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit">Register</button>
    </form>

    <div id="message" class="message"></div>

    <div class="link">
        Already have an account? <a href="teacher-login.html">Login</a>
    </div>
</div>

<script type="module">
import { registerUser, loginUser } from "./js/api.js";

const msg = document.getElementById("message");

// 🔁 Redirect if already logged in
if (localStorage.getItem("token")) {
    window.location.href = "teacher-dashboard.html";
}

// 🚀 Signup handler
document.getElementById("signupForm").addEventListener("submit", async (e)=>{
    e.preventDefault();

    const teacherId = document.getElementById("teacherId").value.trim().toLowerCase();
    const name = document.getElementById("name").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!teacherId || !password || !name){
        msg.innerText = "⚠️ All fields required";
        msg.style.color = "yellow";
        return;
    }

    try{
        msg.innerText = "⏳ Registering...";
        msg.style.color = "white";

        // 🔥 REGISTER
        await registerUser({
            identifier: teacherId,
            password,
            role: "teacher",
            name
        });

        // 🔐 LOGIN
        const res = await loginUser({
            identifier: teacherId,
            password
        });

        // store token
        localStorage.setItem("token", res.token);
        localStorage.setItem("user", JSON.stringify(res.user));

        msg.innerText = "✅ Registered & Logged in!";
        msg.style.color = "lightgreen";

        setTimeout(()=>{
            window.location.href = "teacher-dashboard.html";
        },1000);

    }catch(err){
        console.error(err);

        msg.innerText = "❌ " + (err.message || "Something went wrong");
        msg.style.color = "red";
    }
});
</script>

</body>
</html>
