<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:linear-gradient(135deg,#667eea,#764ba2,#00c6ff);color:#fff}

.container{display:flex}

.sidebar{
  width:240px;
  min-height:100vh;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  padding:20px;
}
.sidebar button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.12);
  color:#fff;
  cursor:pointer;
}

.main{flex:1;padding:20px}

.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}
.card{
  padding:15px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
}

.charts{display:flex;gap:20px;margin-top:20px;flex-wrap:wrap}
canvas{background:rgba(255,255,255,0.1);padding:10px;border-radius:15px}

.notification{
  background:#ffcc00;
  color:black;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

@media(max-width:768px){
  .container{flex-direction:column}
  .sidebar{width:100%;display:flex;gap:10px}
  .cards{grid-template-columns:1fr}
  .charts{flex-direction:column}
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<h2>Student</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('marks')">Marks</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<h2 id="welcome"></h2>

<div id="notifications"></div>

<div class="cards">
<div class="card">Attendance %<br><b id="att">0%</b></div>
<div class="card">Present<br><b id="present">0</b></div>
<div class="card">Total<br><b id="total">0</b></div>
<div class="card">Avg Marks<br><b id="avg">0</b></div>
</div>

<div id="analytics" style="margin-top:20px;"></div>

<div id="dashboard">

<div class="charts">
<canvas id="attendanceChart"></canvas>
<canvas id="marksChart"></canvas>
<canvas id="trendChart"></canvas>
</div>

<h3>Calendar</h3>
<div id="calendar"></div>

</div>

<div id="marksSection" style="display:none">
<h3>Marks</h3>
<table>
<tr><th>Subject</th><th>Marks</th></tr>
<tbody id="marksList"></tbody>
</table>
</div>

</div>
</div>

<script>

// ===== LOGOUT =====
function logout(){
  if(!confirm("Logout?")) return;
  localStorage.clear();
  window.location.href="index.html";
}

// ===== AUTH =====
const token = localStorage.getItem("token");
if(!token) window.location.href="index.html";

let payload = JSON.parse(atob(token.split('.')[1]));

if(payload.role !== "student") window.location.href="index.html";

const user = payload;
document.getElementById("welcome").innerText = "Welcome " + user.identifier;

// ===== BASE URL =====
const BASE_URL = location.hostname==="localhost"
? "http://127.0.0.1:5000/api"
: "https://student-management-system-api-cznx.onrender.com/api";

// ===== API =====
async function api(url){
  const res = await fetch(url,{headers:{Authorization:"Bearer "+token}});
  const data = await res.json();
  if(!res.ok) throw new Error(data.message);
  return data;
}

// ===== DASHBOARD =====
async function loadDashboard(){
  const res = await api(`${BASE_URL}/students/dashboard/${user.identifier}`);
  const d = res.data || res;

  const present = d.attendance?.present || 0;
  const total = d.attendance?.total || 0;

  document.getElementById("present").innerText = present;
  document.getElementById("total").innerText = total;
  document.getElementById("att").innerText = total?((present/total)*100).toFixed(1)+"%":0;

  const marks = d.marks || [];

  const avg = marks.length
    ? (marks.reduce((a,b)=>a+b.marks,0)/marks.length).toFixed(2)
    : 0;

  document.getElementById("avg").innerText = avg;

  document.getElementById("marksList").innerHTML =
    marks.map(m=>`<tr><td>${m.subject}</td><td>${m.marks}</td></tr>`).join("");

  showAnalytics(marks);
  drawCharts(present,total,marks);
  calculateRank(avg);
  generateSuggestions(avg, marks);
}

// ===== RANK SYSTEM =====
async function calculateRank(myAvg){
  const res = await api(`${BASE_URL}/students`);
  const students = res.data || [];

  const sorted = students.sort((a,b)=>b.avg_marks - a.avg_marks);

  const rank = sorted.findIndex(s=>s.avg_marks == myAvg) + 1;

  document.getElementById("analytics").innerHTML += `
    <p>🏅 Rank in Class: <b>#${rank}</b></p>
  `;
}

// ===== ANALYTICS =====
function showAnalytics(marks){
  if(!marks.length) return;

  const top = marks.reduce((a,b)=>a.marks>b.marks?a:b);
  const weak = marks.reduce((a,b)=>a.marks<b.marks?a:b);

  document.getElementById("analytics").innerHTML = `
    <div class="card">
      <h3>📊 Analysis</h3>
      <p>🏆 Top: ${top.subject}</p>
      <p>⚠ Weak: ${weak.subject}</p>
    </div>
  `;
}

// ===== AI SUGGESTIONS =====
function generateSuggestions(avg, marks){
  let msg = "";

  if(avg < 50) msg = "Focus on fundamentals.";
  else if(avg < 70) msg = "Improve weak subjects.";
  else msg = "Great work! Keep improving.";

  document.getElementById("notifications").innerHTML = `
    <div class="notification">🧠 ${msg}</div>
  `;
}

// ===== CHARTS =====
let aChart,mChart,tChart;

function drawCharts(present,total,marks){

  if(aChart) aChart.destroy();
  if(mChart) mChart.destroy();
  if(tChart) tChart.destroy();

  aChart = new Chart(attendanceChart,{
    type:"doughnut",
    data:{labels:["Present","Absent"],datasets:[{data:[present,total-present]}]}
  });

  mChart = new Chart(marksChart,{
    type:"bar",
    data:{labels:marks.map(m=>m.subject),datasets:[{data:marks.map(m=>m.marks)}]}
  });

  // Trend (mock or future history)
  tChart = new Chart(trendChart,{
    type:"line",
    data:{
      labels:marks.map(m=>m.subject),
      datasets:[{label:"Trend",data:marks.map(m=>m.marks)}]
    }
  });
}

// ===== CALENDAR =====
async function loadCalendar(){
  const res = await api(`${BASE_URL}/attendance/${user.identifier}`);
  const data = res.data || res;

  const cal = document.getElementById("calendar");
  cal.innerHTML="";

  data.forEach(r=>{
    const div=document.createElement("div");
    div.className="day "+r.status;
    div.innerText=r.date.split("-")[2];
    cal.appendChild(div);
  });
}

// ===== AUTO REFRESH =====
setInterval(()=>{
  loadDashboard();
  loadCalendar();
},10000);

// ===== NAV =====
function show(id){
  dashboard.style.display = id==="dashboard"?"block":"none";
  marksSection.style.display = id==="marks"?"block":"none";
}

// INIT
loadDashboard();
loadCalendar();

</script>

</body>
</html>
