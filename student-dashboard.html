<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:linear-gradient(135deg,#667eea,#764ba2,#00c6ff);color:#fff}
.container{display:flex}
.sidebar{width:240px;height:100vh;background:rgba(255,255,255,0.08);backdrop-filter:blur(15px);padding:25px}
.sidebar h2{margin-bottom:30px}
.sidebar button{width:100%;padding:12px;margin:8px 0;border:none;border-radius:12px;background:rgba(255,255,255,0.12);color:#fff;cursor:pointer}
.main{flex:1;padding:25px}
.nav{display:flex;justify-content:space-between;margin-bottom:20px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}
.card{padding:20px;border-radius:15px;background:rgba(255,255,255,0.1)}
.charts{display:flex;gap:30px;margin-top:20px}
canvas{background:rgba(255,255,255,0.1);padding:15px;border-radius:15px}
table{width:100%;margin-top:20px}
td,th{padding:10px;text-align:left}
#calendar{margin-top:15px;display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.day{padding:10px;text-align:center;border-radius:10px;background:rgba(255,255,255,0.1)}
.present{background:#00ff88;color:black}
.absent{background:#ff4d4d}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
    <h2>Student</h2>
    <button onclick="show('dashboard')">Dashboard</button>
    <button onclick="show('marks')">Marks</button>
    <button onclick="logout()">Logout</button>
</div>

<div class="main">

<div class="nav">
    <h2 id="welcome">Welcome</h2>
</div>

<div class="cards">
    <div class="card">Attendance %<br><b id="att">0%</b></div>
    <div class="card">Present Days<br><b id="present">0</b></div>
    <div class="card">Total Days<br><b id="total">0</b></div>
    <div class="card">🔥 Streak<br><b id="streak">0</b></div>
</div>

<div id="dashboard">

<div class="charts">
    <canvas id="attendanceChart"></canvas>
    <canvas id="marksChart"></canvas>
</div>

<div>
<h3>Attendance Calendar</h3>
<div id="calendar"></div>
</div>

</div>

<div id="marks" style="display:none">
<h3>Marks</h3>
<table>
<tr><th>Subject</th><th>Marks</th></tr>
<tbody id="marksList"></tbody>
</table>
</div>

</div>
</div>

<!-- ✅ USE MODULE -->
<script type="module">

import {
  getDashboard,
  getAttendance,
  logout as apiLogout
} from "./js/api.js";

// ================= AUTH CHECK =================
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user"));

if (!token || !user) {
  window.location.href = "student-login.html";
}

const rollno = user.identifier || user.rollno || user.id;
document.getElementById("welcome").innerText = "Welcome " + rollno;

// ================= DASHBOARD =================
async function loadDashboard(){
    try{
        const res = await getDashboard(rollno);

        const d = res.data || res;

        document.getElementById("att").innerText = (d.attendance_percent || 0) + "%";
        document.getElementById("present").innerText = d.present_days || 0;
        document.getElementById("total").innerText = d.total_days || 0;

        document.getElementById("marksList").innerHTML =
            (d.marks || []).map(m =>
                `<tr><td>${m.subject}</td><td>${m.marks}</td></tr>`
            ).join("");

        drawCharts(d);

    }catch(err){
        console.error("Dashboard error:", err);
    }
}

// ================= CHARTS =================
let aChart, mChart;

function drawCharts(d){

    if(aChart) aChart.destroy();
    if(mChart) mChart.destroy();

    aChart = new Chart(document.getElementById("attendanceChart"),{
        type:'pie',
        data:{
            labels:['Present','Absent'],
            datasets:[{
                data:[
                    d.present_days || 0,
                    (d.total_days || 0) - (d.present_days || 0)
                ]
            }]
        }
    });

    mChart = new Chart(document.getElementById("marksChart"),{
        type:'bar',
        data:{
            labels:(d.marks || []).map(m=>m.subject),
            datasets:[{
                data:(d.marks || []).map(m=>m.marks)
            }]
        }
    });
}

// ================= CALENDAR =================
async function loadCalendar(){
    try{
        const res = await getAttendance(rollno);
        const records = res.data || res;

        const cal = document.getElementById("calendar");
        cal.innerHTML="";

        records.forEach(r=>{
            const div=document.createElement("div");
            div.className="day " + r.status;
            div.innerText = r.date.split("-")[2];
            cal.appendChild(div);
        });

    }catch(err){
        console.error("Calendar error:", err);
    }
}

// ================= NAV =================
window.show = function(id){
    document.getElementById("dashboard").style.display = id==="dashboard"?"block":"none";
    document.getElementById("marks").style.display = id==="marks"?"block":"none";
}

// ================= LOGOUT =================
window.logout = function(){
    apiLogout();
}

// ================= INIT =================
loadDashboard();
loadCalendar();

</script>

</body>
</html>
