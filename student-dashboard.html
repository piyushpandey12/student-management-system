<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:linear-gradient(135deg,#667eea,#764ba2,#00c6ff);color:#fff}
.container{display:flex}
.sidebar{width:240px;height:100vh;background:rgba(255,255,255,0.08);backdrop-filter:blur(15px);padding:25px}
.sidebar h2{margin-bottom:30px}
.sidebar button{width:100%;padding:12px;margin:8px 0;border:none;border-radius:12px;background:rgba(255,255,255,0.12);color:#fff;cursor:pointer}
.main{flex:1;padding:25px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}
.card{padding:20px;border-radius:15px;background:rgba(255,255,255,0.1)}
.charts{display:flex;gap:30px;margin-top:20px}
canvas{background:rgba(255,255,255,0.1);padding:15px;border-radius:15px}
table{width:100%;margin-top:20px}
td,th{padding:10px;text-align:left}
#calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:10px}
.day{padding:10px;text-align:center;border-radius:10px;background:rgba(255,255,255,0.1)}
.present{background:#00ff88;color:black}
.absent{background:#ff4d4d}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<h2>Student</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('marks')">Marks</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<h2 id="welcome"></h2>

<div class="cards">
<div class="card">Attendance %<br><b id="att">0%</b></div>
<div class="card">Present<br><b id="present">0</b></div>
<div class="card">Total<br><b id="total">0</b></div>
<div class="card">Avg Marks<br><b id="avg">0</b></div>
</div>

<div id="dashboard">

<div class="charts">
<canvas id="attendanceChart"></canvas>
<canvas id="marksChart"></canvas>
</div>

<h3>Calendar</h3>
<div id="calendar"></div>

</div>

<div id="marksSection" style="display:none">
<h3>Marks</h3>
<table>
<tr><th>Subject</th><th>Marks</th></tr>
<tbody id="marksList"></tbody>
</table>
</div>

</div>
</div>

<script>

// ================= AUTH =================
function logout(msg){
  if(msg) alert(msg);
  localStorage.clear();
  window.location.href="login.html";
}

const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user") || "{}");

if(!token || !user.identifier){
  logout("Session expired");
}

document.getElementById("welcome").innerText = "Welcome " + user.identifier;


// ================= BASE URL =================
const BASE_URL =
  window.location.hostname === "localhost"
    ? "http://127.0.0.1:5000/api"
    : "https://student-management-system-api-cznx.onrender.com/api";


// ================= FETCH =================
async function api(url){
  try{
    const res = await fetch(url,{
      headers:{ "Authorization":"Bearer "+token }
    });

    if(res.status===401) logout("Session expired");

    const data = await res.json();

    if(!res.ok) throw new Error(data.message || "API Error");

    return data;
  }catch(err){
    console.error("API ERROR:", err);
    alert("Server error. Check backend.");
    throw err;
  }
}


// ================= DASHBOARD =================
async function loadDashboard(){
  try{
    const data = await api(`${BASE_URL}/students/dashboard/${user.identifier}`);

    // 🔥 FIX: support both formats
    const d = data.data || data;

    if(!d){
      throw new Error("Invalid response");
    }

    document.getElementById("att").innerText = (d.attendance_percent || 0) + "%";
    document.getElementById("present").innerText = d.attendance?.present || 0;
    document.getElementById("total").innerText = d.attendance?.total || 0;
    document.getElementById("avg").innerText = d.average_marks || 0;

    // Marks table
    document.getElementById("marksList").innerHTML =
      (d.marks || []).map(m =>
        `<tr><td>${m.subject}</td><td>${m.marks}</td></tr>`
      ).join("");

    drawCharts(d);

  }catch(e){
    console.error(e);
  }
}


// ================= CHARTS =================
let aChart, mChart;

function drawCharts(d){

  const attCanvas = document.getElementById("attendanceChart");
  const marksCanvas = document.getElementById("marksChart");

  if(aChart) aChart.destroy();
  if(mChart) mChart.destroy();

  aChart = new Chart(attCanvas,{
    type:'pie',
    data:{
      labels:['Present','Absent'],
      datasets:[{
        data:[
          d.attendance?.present || 0,
          (d.attendance?.total || 0) - (d.attendance?.present || 0)
        ]
      }]
    }
  });

  mChart = new Chart(marksCanvas,{
    type:'bar',
    data:{
      labels:(d.marks || []).map(m=>m.subject),
      datasets:[{
        data:(d.marks || []).map(m=>m.marks)
      }]
    }
  });
}


// ================= CALENDAR =================
async function loadCalendar(){
  try{
    const res = await api(`${BASE_URL}/attendance/${user.identifier}`);
    const data = res.data || res;

    const cal = document.getElementById("calendar");
    cal.innerHTML = "";

    (data || []).forEach(r=>{
      const div=document.createElement("div");
      div.className="day "+(r.status || "absent");
      div.innerText = r.date ? r.date.split("-")[2] : "";
      cal.appendChild(div);
    });

  }catch(e){
    console.error(e);
  }
}


// ================= NAV =================
function show(id){

  document.getElementById("dashboard").style.display =
    id==="dashboard" ? "block" : "none";

  document.getElementById("marksSection").style.display =
    id==="marks" ? "block" : "none";

}


// ================= INIT =================
loadDashboard();
loadCalendar();

</script>
</body>
</html>
