<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:linear-gradient(135deg,#667eea,#764ba2,#00c6ff);color:#fff}
.container{display:flex}
.sidebar{width:240px;min-height:100vh;background:rgba(0,0,0,0.25);padding:20px}
.sidebar button{width:100%;padding:12px;margin:8px 0;border:none;border-radius:12px;background:rgba(255,255,255,0.15);color:#fff;cursor:pointer}
.main{flex:1;padding:25px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}
.card{padding:18px;border-radius:15px;background:rgba(255,255,255,0.15)}
table{width:100%;margin-top:10px;border-collapse:collapse}
th{background:rgba(255,255,255,0.3);color:#000}
th,td{padding:10px}
tr{background:rgba(255,255,255,0.08)}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <h2>🎓 Student</h2>
  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('marks')">Marks</button>
  <button onclick="show('leaderboard')">Leaderboard</button>
  <button onclick="downloadReport()">Download Report</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">

<h2 id="welcome"></h2>

<div class="cards">
  <div class="card"><p>Attendance</p><h2 id="att">0%</h2></div>
  <div class="card"><p>Present</p><h2 id="present">0</h2></div>
  <div class="card"><p>Total</p><h2 id="total">0</h2></div>
  <div class="card"><p>Average</p><h2 id="avg">0</h2></div>
</div>

<div id="dashboard">
  <canvas id="attendanceChart"></canvas>
  <canvas id="marksChart"></canvas>
</div>

<div id="marksSection" style="display:none">
<h3>Marks</h3>
<table>
<thead>
<tr><th>Subject</th><th>Marks</th><th>Grade</th></tr>
</thead>
<tbody id="marksList"></tbody>
</table>
</div>

<div id="leaderboard" style="display:none">
<h3>Leaderboard</h3>
<table>
<tbody id="leaderboardList"></tbody>
</table>
</div>

</div>
</div>

<script>

// ================= AUTH =================
const token = localStorage.getItem("token");

if (!token) location.href = "index.html";

let user = {};
try {
  user = JSON.parse(atob(token.split('.')[1]));
} catch {
  alert("Session expired. Login again.");
  localStorage.clear();
  location.href = "index.html";
}

document.getElementById("welcome").innerText =
  "Welcome " + (user.identifier || user.rollno || "Student");

// ================= BASE URL =================
const BASE_URL =
  location.hostname === "localhost"
    ? "http://127.0.0.1:5000/api"
    : "https://student-management-system-api-cznx.onrender.com/api";

// ================= API =================
async function api(url) {
  try {
    const res = await fetch(url, {
      headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.message || "API Error");

    return data;
  } catch (err) {
    console.error(err);
    alert(err.message);
    return {};
  }
}

// ================= LOAD DASHBOARD =================
async function loadDashboard() {

  const id = user.identifier || user.rollno;

  const res = await api(`${BASE_URL}/students/dashboard/${id}`);
  const d = res.data || res;

  const present = d.attendance?.present || 0;
  const total = d.attendance?.total || 0;
  const marks = d.marks || [];

  presentEl.innerText = present;
  totalEl.innerText = total;

  const percent = total ? ((present / total) * 100).toFixed(1) : 0;
  att.innerText = percent + "%";

  const avgVal = marks.length
    ? (marks.reduce((a, b) => a + (b.marks || 0), 0) / marks.length).toFixed(2)
    : 0;

  avg.innerText = avgVal;

  // TABLE
  marksList.innerHTML = marks.map(m => {
    let grade =
      m.marks >= 90 ? "A" :
      m.marks >= 70 ? "B" :
      m.marks >= 40 ? "C" : "F";

    return `<tr>
      <td>${m.subject}</td>
      <td>${m.marks}</td>
      <td>${grade}</td>
    </tr>`;
  }).join("");

  drawCharts(present, total, marks);
}

// ================= CHART =================
let aChart, mChart;

function drawCharts(present, total, marks) {

  if (aChart) aChart.destroy();
  if (mChart) mChart.destroy();

  aChart = new Chart(document.getElementById("attendanceChart"), {
    type: "doughnut",
    data: {
      labels: ["Present", "Absent"],
      datasets: [{ data: [present, total - present] }]
    }
  });

  mChart = new Chart(document.getElementById("marksChart"), {
    type: "bar",
    data: {
      labels: marks.map(m => m.subject),
      datasets: [{ data: marks.map(m => m.marks) }]
    }
  });
}

// ================= LEADERBOARD =================
async function loadLeaderboard() {

  const res = await api(`${BASE_URL}/students`);
  const students = res.data || [];

  const sorted = students.sort((a, b) =>
    (b.avg_marks || 0) - (a.avg_marks || 0)
  );

  leaderboardList.innerHTML = sorted.map((s, i) => `
    <tr>
      <td>#${i + 1}</td>
      <td>${s.rollno || s.identifier}</td>
      <td>${s.avg_marks || 0}</td>
    </tr>
  `).join("");
}

// ================= PDF =================
function downloadReport() {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const avgVal = Number(avg.innerText);

  doc.text("Student Report", 20, 20);
  doc.text(`ID: ${user.identifier || user.rollno}`, 20, 40);
  doc.text(`Average: ${avgVal}`, 20, 50);

  let y = 70;

  document.querySelectorAll("#marksList tr").forEach(row => {
    const cols = row.querySelectorAll("td");
    doc.text(cols[0].innerText, 20, y);
    doc.text(cols[1].innerText, 100, y);
    doc.text(cols[2].innerText, 150, y);
    y += 10;
  });

  doc.save("report.pdf");
}

// ================= NAV =================
function show(id) {

  dashboard.style.display = id === "dashboard" ? "block" : "none";
  marksSection.style.display = id === "marks" ? "block" : "none";
  leaderboard.style.display = id === "leaderboard" ? "block" : "none";

  if (id === "leaderboard") loadLeaderboard();
}

// ================= LOGOUT =================
function logout() {
  localStorage.clear();
  location.href = "index.html";
}

// ================= INIT =================
loadDashboard();

</script>

</body>
</html>
