<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
  background:linear-gradient(135deg,#667eea,#764ba2,#00c6ff);
  color:#fff;
}

.container{display:flex}

/* SIDEBAR */
.sidebar{
  width:240px;
  min-height:100vh;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  padding:20px;
}

.sidebar h2{margin-bottom:15px}

.sidebar button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.12);
  color:#fff;
  cursor:pointer;
}

/* MAIN */
.main{flex:1;padding:25px}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.card{
  padding:15px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
}

/* CHARTS */
.charts{
  display:flex;
  gap:20px;
  margin-top:20px;
  flex-wrap:wrap;
}

canvas{
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:15px;
  width:300px !important;
  height:250px !important;
}

/* SECTION */
.section{
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:15px;
  margin-top:20px;
}

/* TABLE */
table{
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
}

th,td{padding:10px}

th{
  background:rgba(255,255,255,0.2);
}

tr{
  background:rgba(255,255,255,0.05);
}

/* CALENDAR */
#calendarGrid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
  margin-top:10px;
}

.day{
  padding:10px;
  background:#334155;
  border-radius:6px;
  text-align:center;
}

.present{background:#22c55e}
.absent{background:#ef4444}

/* RESPONSIVE */
@media(max-width:768px){
  .container{flex-direction:column}
  .sidebar{width:100%;display:flex;gap:10px}
  .cards{grid-template-columns:1fr}
  .charts{flex-direction:column}
}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🎓 Student</h2>
  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('marks')">Marks</button>
  <button onclick="show('leaderboard')">Leaderboard</button>
  <button onclick="downloadReport()">Download Report</button>
  <button onclick="toggleTheme()">Theme</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
  <h2 id="welcome"></h2>

  <div style="display:flex;align-items:center;gap:10px;">
    <img id="avatar" width="40" style="border-radius:50%">
    <input type="file" onchange="uploadAvatar(event)">
  </div>
</div>

<!-- CARDS -->
<div class="cards">
  <div class="card"><p>Attendance</p><h2 id="att">0%</h2></div>
  <div class="card"><p>Present</p><h2 id="present">0</h2></div>
  <div class="card"><p>Total</p><h2 id="total">0</h2></div>
  <div class="card"><p>Average</p><h2 id="avg">0</h2></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="charts">
  <canvas id="attendanceChart"></canvas>
  <canvas id="marksChart"></canvas>
</div>

<div class="section">
  <h3>AI Insight</h3>
  <div id="activity"></div>
</div>

<div class="section">
  <h3>Attendance Calendar</h3>
  <div id="calendarGrid"></div>
</div>

</div>

<!-- MARKS -->
<div id="marksSection" style="display:none">
<h3 style="margin-top:20px;">Marks</h3>

<table>
<thead><tr><th>Subject</th><th>Marks</th></tr></thead>
<tbody id="marksList"></tbody>
</table>
</div>

<!-- LEADERBOARD -->
<div id="leaderboard" style="display:none">
<h3 style="margin-top:20px;">Leaderboard</h3>

<table>
<tbody id="leaderboardList"></tbody>
</table>
</div>

</div>
</div>

<script>

// AUTH
const token = localStorage.getItem("token");
if(!token) location.href="index.html";

const user = JSON.parse(atob(token.split('.')[1]));
document.getElementById("welcome").innerText = "Welcome " + user.identifier;

// API
const BASE_URL = location.hostname==="localhost"
? "http://127.0.0.1:5000/api"
: "https://student-management-system-api-cznx.onrender.com/api";

async function api(url){
  const res = await fetch(url,{headers:{Authorization:"Bearer "+token}});
  return res.json();
}

// LOAD
async function loadDashboard(){
  const res = await api(`${BASE_URL}/students/dashboard/${user.identifier}`);
  const d = res.data || res;

  const present = d.attendance?.present || 0;
  const total = d.attendance?.total || 0;
  const marks = d.marks || [];

  document.getElementById("present").innerText = present;
  document.getElementById("total").innerText = total;
  document.getElementById("att").innerText = total?((present/total)*100).toFixed(1)+"%":"0%";

  const avg = marks.length ? (marks.reduce((a,b)=>a+b.marks,0)/marks.length).toFixed(2) : 0;
  document.getElementById("avg").innerText = avg;

  document.getElementById("marksList").innerHTML =
    marks.length
    ? marks.map(m=>`<tr><td>${m.subject}</td><td>${m.marks}</td></tr>`).join("")
    : `<tr><td colspan="2">No data</td></tr>`;

  drawCharts(present,total,marks);
  loadCalendar();

  const attendancePercent = total ? (present/total)*100 : 0;
  aiPrediction(avg,attendancePercent);
}

// CHARTS
let aChart,mChart;

function drawCharts(present,total,marks){

  if(aChart) aChart.destroy();
  if(mChart) mChart.destroy();

  aChart = new Chart(attendanceChart,{
    type:"doughnut",
    data:{labels:["Present","Absent"],datasets:[{data:[present,total-present]}]}
  });

  mChart = new Chart(marksChart,{
    type:"bar",
    data:{labels:marks.map(m=>m.subject),datasets:[{data:marks.map(m=>m.marks)}]}
  });
}

// CALENDAR
async function loadCalendar(){
  const res = await api(`${BASE_URL}/attendance/${user.identifier}`);
  const data = res.data || [];

  const grid = document.getElementById("calendarGrid");
  grid.innerHTML="";

  for(let i=1;i<=30;i++){
    const record = data.find(d=>parseInt(d.date.split("-")[2])===i);
    const div=document.createElement("div");
    div.className="day "+(record?.status||"");
    div.innerText=i;
    grid.appendChild(div);
  }
}

// AI
function aiPrediction(avg,attendance){
  let score = avg*0.6 + attendance*0.4;

  let msg = score>70?"High chance to PASS"
           :score>50?"Moderate Risk"
           :"High Risk";

  document.getElementById("activity").innerHTML =
    `<p>🧠 <b>${msg}</b></p>`;
}

// LEADERBOARD
async function loadLeaderboard(){
  const res = await api(`${BASE_URL}/students`);
  const students = res.data || [];

  const sorted = students.sort((a,b)=>b.avg_marks-a.avg_marks);

  document.getElementById("leaderboardList").innerHTML =
    sorted.map((s,i)=>`
      <tr><td>#${i+1}</td><td>${s.identifier}</td><td>${s.avg_marks}</td></tr>
    `).join("");
}

// AVATAR
function uploadAvatar(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = ()=>{
    localStorage.setItem("avatar",reader.result);
    document.getElementById("avatar").src=reader.result;
  };

  reader.readAsDataURL(file);
}

const savedAvatar = localStorage.getItem("avatar");
if(savedAvatar) document.getElementById("avatar").src = savedAvatar;

// THEME
function toggleTheme(){
  const root=document.documentElement;
  const dark=root.style.getPropertyValue('--bg')==='#0f172a';

  root.style.setProperty('--bg',dark?'#fff':'#0f172a');
  root.style.setProperty('--text',dark?'#000':'#fff');
}

// PDF
function downloadReport(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("Student Report",20,20);
  doc.text("Name: "+user.identifier,20,30);
  doc.text("Avg: "+document.getElementById("avg").innerText,20,40);

  doc.save("report.pdf");
}

// NAV
function show(id){
  dashboard.style.display = id==="dashboard"?"block":"none";
  marksSection.style.display = id==="marks"?"block":"none";
  leaderboard.style.display = id==="leaderboard"?"block":"none";

  if(id==="leaderboard") loadLeaderboard();
}

// LOGOUT
function logout(){
  localStorage.clear();
  location.href="index.html";
}

// INIT
loadDashboard();

</script>

</body>
</html>
