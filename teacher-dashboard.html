<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
  background:linear-gradient(135deg,#667eea,#764ba2,#00c6ff);
  color:#fff;
}

.container{display:flex}

/* SIDEBAR */
.sidebar{
  width:240px;
  min-height:100vh;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  padding:20px;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.12);
  color:#fff;
  cursor:pointer;
  transition:0.3s;
}

.sidebar button:hover{
  background:rgba(255,255,255,0.25);
}

/* MAIN */
.main{flex:1;padding:25px}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.card{
  padding:15px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
}

/* SECTION */
.section{
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:15px;
  margin-top:20px;
}

/* TABLE */
table{
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
}
th,td{padding:10px}
tr{background:rgba(255,255,255,0.05)}

/* BUTTONS */
button.action{
  background:linear-gradient(135deg,#4f46e5,#6366f1);
  border:none;
  padding:10px 15px;
  border-radius:10px;
  color:#fff;
  cursor:pointer;
}

button.delete{
  background:#ef4444;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
}

input,select{
  padding:10px;
  border:none;
  border-radius:10px;
  margin:5px;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <h2>👨‍🏫 Teacher</h2>
  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('students')">Students</button>
  <button onclick="show('marks')">Marks</button>
  <button onclick="show('analytics')">Analytics</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">

<!-- CARDS -->
<div class="cards">
  <div class="card">Students <h2 id="totalStudents">0</h2></div>
  <div class="card">Avg <h2 id="classAvg">0</h2></div>
  <div class="card">Top <h2 id="topScore">0</h2></div>
  <div class="card">Weak <h2 id="weakCount">0</h2></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
  <canvas id="performanceChart"></canvas>
</div>

<!-- STUDENTS -->
<div id="students" class="section" style="display:none">

<h3>Add Student</h3>
<input id="name" placeholder="Name">
<input id="roll" placeholder="Roll">
<input id="password" placeholder="Password">
<button class="action" onclick="addStudent()">Add</button>

<table>
<thead>
<tr><th>Roll</th><th>Name</th><th>Avg</th><th>Action</th></tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<!-- MARKS -->
<div id="marks" class="section" style="display:none">

<h3>Manage Marks</h3>

<select id="studentSelect"></select>

<div id="marksForm"></div>

<button class="action" onclick="saveMarks()">Save Marks</button>

<canvas id="subjectChart"></canvas>

</div>

</div>
</div>

<script>

// SUBJECTS
const SUBJECTS = [
"Big Data Analytics","Cloud Computing","Machine Learning",
"Information Security","Mobile Application Development"
];

// AUTH
const token = localStorage.getItem("token");
if(!token) location.href="index.html";

const BASE_URL = location.hostname==="localhost"
? "http://127.0.0.1:5000/api"
: "https://student-management-system-api-cznx.onrender.com/api";

async function api(url,options={}){
  const res = await fetch(url,{
    ...options,
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    }
  });
  return res.json();
}

// DATA
let studentsData=[];

async function loadStudents(){
  const res = await api(`${BASE_URL}/students`);
  studentsData = res.data || [];

  totalStudents.innerText = studentsData.length;

  renderTable(studentsData);

  // dropdown
  studentSelect.innerHTML = studentsData.map(s=>
    `<option value="${s.rollno}">${s.name}</option>`
  ).join("");

  renderMarksForm();
}

// TABLE
function renderTable(data){
  table.innerHTML = data.map(s=>`
    <tr>
      <td>${s.rollno}</td>
      <td>${s.name}</td>
      <td>${s.avg_marks||0}</td>
      <td>
        <button class="delete" onclick="deleteStudent('${s.rollno}')">Delete</button>
      </td>
    </tr>
  `).join("");
}

// MARK FORM
function renderMarksForm(){
  marksForm.innerHTML = SUBJECTS.map(sub=>`
    <div>
      ${sub}
      <input type="number" id="mark_${sub}">
    </div>
  `).join("");
}

// SAVE MARKS
async function saveMarks(){
  const roll = studentSelect.value;

  const marks = SUBJECTS.map(sub=>({
    subject:sub,
    marks:Number(document.getElementById(`mark_${sub}`).value||0)
  }));

  await api(`${BASE_URL}/marks/${roll}`,{
    method:"POST",
    body:JSON.stringify({marks})
  });

  alert("Saved");
}

// LOAD MARKS
studentSelect.addEventListener("change", async ()=>{
  const roll = studentSelect.value;
  const res = await api(`${BASE_URL}/students/${roll}`);
  const marks = res.data?.marks || [];

  SUBJECTS.forEach(sub=>{
    const f = marks.find(m=>m.subject===sub);
    document.getElementById(`mark_${sub}`).value = f?.marks || "";
  });

  drawSubjectChart(marks);
});

// SUBJECT CHART
let subjectChart;
function drawSubjectChart(marks){

  if(subjectChart) subjectChart.destroy();

  subjectChart = new Chart(subjectChartCanvas,{
    type:"bar",
    data:{
      labels:marks.map(m=>m.subject),
      datasets:[{data:marks.map(m=>m.marks)}]
    }
  });
}

// ADD
async function addStudent(){
  await api(`${BASE_URL}/students`,{
    method:"POST",
    body:JSON.stringify({
      name:name.value,
      rollno:roll.value,
      password:password.value
    })
  });
  loadStudents();
}

// DELETE
async function deleteStudent(roll){
  await api(`${BASE_URL}/students/${roll}`,{method:"DELETE"});
  loadStudents();
}

// NAV
function show(id){
  dashboard.style.display=id==="dashboard"?"block":"none";
  students.style.display=id==="students"?"block":"none";
  marks.style.display=id==="marks"?"block":"none";
}

// LOGOUT
function logout(){
  localStorage.clear();
  location.href="index.html";
}

// INIT
loadStudents();

</script>

</body>
</html>
