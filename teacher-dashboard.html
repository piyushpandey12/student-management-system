<!DOCTYPE html>
<html>
<head>
<title>Teacher Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#5f2c82,#49a09d);
    color:white;
}
.container{max-width:1200px;margin:auto;padding:20px;}
h2{text-align:center;margin-bottom:25px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;}
.card{background:rgba(255,255,255,0.12);backdrop-filter:blur(15px);border-radius:15px;padding:20px;}
.input-group{display:flex;gap:10px;flex-wrap:wrap;}
input,select{
    flex:1;
    padding:10px;
    border-radius:8px;
    border:none;
    background:rgba(255,255,255,0.2);
    color:white;
}
button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#ff4b2b;
    color:white;
    cursor:pointer;
}
button:hover{background:#ff416c;}
table{width:100%;margin-top:10px;}
th,td{padding:10px;text-align:left;}
.gradeA{color:#00ffcc;font-weight:bold;}
.gradeB{color:#ffd700;font-weight:bold;}
.gradeC{color:#ff6b6b;font-weight:bold;}
</style>
</head>

<body>

<div class="container">
<h2>👨‍🏫 Teacher Dashboard</h2>

<div class="grid">

<!-- ADD STUDENT -->
<div class="card">
<h3>➕ Add Student</h3>
<div class="input-group">
<input id="name" placeholder="Name">
<input id="roll" placeholder="Roll No">
<input id="password" placeholder="Password">
<button onclick="addStudent()">Add</button>
</div>
</div>

<!-- ATTENDANCE -->
<div class="card">
<h3>📅 Attendance</h3>
<div class="input-group">
<input type="date" id="date">
<input id="rollAtt" placeholder="Roll No">
<select id="status">
<option value="present">Present</option>
<option value="absent">Absent</option>
</select>
<button onclick="markAttendance()">Mark</button>
</div>
</div>

<!-- MARKS -->
<div class="card">
<h3>📊 Marks</h3>
<div class="input-group">
<input id="rollMarks" placeholder="Roll No">

<select id="subject">
<option>Big Data Analytics</option>
<option>Big Data Analytics Lab</option>
<option>Cloud Computing</option>
<option>Cloud Computing Lab</option>
<option>Engineering Aptitude - III</option>
<option>Functional English - III</option>
<option>Information Security</option>
<option>Machine Learning</option>
<option>Machine Learning Lab</option>
<option>Mobile Application Development</option>
<option>Mobile Application Development Lab</option>
</select>

<input id="marks" placeholder="Marks">
<button onclick="addMarks()">Save</button>
</div>
</div>

<!-- STUDENTS TABLE -->
<div class="card" style="grid-column:1/-1">
<h3>📋 Students</h3>
<table id="table">
<thead>
<tr>
<th>Roll</th>
<th>Name</th>
<th>Marks Avg</th>
<th>Grade</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>
</div>

<script>
// =========================================================
// 🔐 AUTH (SAFE)
// =========================================================
function logout(msg){
    alert(msg);
    localStorage.clear();
    window.location.href = "teacher-login.html";
}

const token = localStorage.getItem("token");
if(!token) logout("Session expired");

let payload;
try{
    payload = JSON.parse(atob(token.split('.')[1]));
}catch{
    logout("Invalid token");
}

if(payload.exp && payload.exp < Date.now()/1000){
    logout("Session expired");
}

const user = { identifier: payload.identifier };


// =========================================================
// 🌐 BASE URL
// =========================================================
const BASE_URL =
  window.location.hostname === "localhost"
    ? "http://127.0.0.1:5000/api"
    : "https://student-management-system-api-cznx.onrender.com/api";


// =========================================================
// 📡 API HELPER
// =========================================================
async function api(url, options = {}){
    const res = await fetch(url, {
        ...options,
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token,
            ...(options.headers || {})
        }
    });

    if(res.status === 401){
        logout("Session expired");
    }

    const data = await res.json().catch(()=>({}));

    if(!res.ok){
        throw new Error(data.message || data.error || "Request failed");
    }

    return data;
}


// =========================================================
// 📋 LOAD STUDENTS
// =========================================================
async function loadStudents(){
    try{
        const res = await api(`${BASE_URL}/students`);
        const students = res.data || [];

        let html = "";

        students.forEach(s=>{
            let grade = "C";
            if(s.avg_marks > 90) grade = "A";
            else if(s.avg_marks > 70) grade = "B";

            html += `
            <tr>
                <td>${s.rollno}</td>
                <td>${s.name}</td>
                <td>${s.avg_marks || 0}</td>
                <td class="grade${grade}">${grade}</td>
                <td>
                    <button onclick="deleteStudent('${s.rollno}')">Delete</button>
                </td>
            </tr>`;
        });

        document.querySelector("#table tbody").innerHTML = html;

    }catch(err){
        console.error("Load error:", err);
    }
}


// =========================================================
// ➕ ADD STUDENT
// =========================================================
async function addStudent(){
    const name = document.getElementById("name").value.trim();
    const roll = document.getElementById("roll").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!name || !roll || !password){
        return alert("Fill all fields");
    }

    try{
        await api(`${BASE_URL}/students`, {
            method: "POST",
            body: JSON.stringify({
                name,
                rollno: roll,
                password
            })
        });

        alert("Student added successfully");

        // clear
        document.getElementById("name").value = "";
        document.getElementById("roll").value = "";
        document.getElementById("password").value = "";

        loadStudents();

    }catch(err){
        alert(err.message);
    }
}


// =========================================================
// ❌ DELETE STUDENT
// =========================================================
async function deleteStudent(roll){
    try{
        await api(`${BASE_URL}/students/${roll}`, {
            method: "DELETE"
        });

        loadStudents();

    }catch(err){
        alert(err.message);
    }
}


// =========================================================
// 📅 ATTENDANCE
// =========================================================
async function markAttendance(){
    const roll = document.getElementById("rollAtt").value.trim();
    const date = document.getElementById("date").value;
    const status = document.getElementById("status").value;

    if(!roll || !date){
        return alert("Fill all fields");
    }

    try{
        await api(`${BASE_URL}/attendance/mark`, {
            method: "POST",
            body: JSON.stringify({
                rollno: roll,
                date,
                status,
                teacher_id: user.identifier   // ✅ required
            })
        });

        alert("Attendance marked");

    }catch(err){
        alert(err.message);
    }
}


// =========================================================
// 📊 MARKS (PER SUBJECT FIXED)
// =========================================================
async function addMarks(){
    const roll = document.getElementById("rollMarks").value.trim();
    const subject = document.getElementById("subject").value.trim();
    const marks = document.getElementById("marks").value.trim();

    if(!roll || !subject || !marks){
        return alert("Fill all fields");
    }

    if(isNaN(marks) || marks < 0 || marks > 100){
        return alert("Marks must be 0–100");
    }

    try{
        await api(`${BASE_URL}/marks/update`, {
            method: "POST",
            body: JSON.stringify({
                rollno: roll,
                subject,
                marks: Number(marks),
                teacher_id: user.identifier   // ✅ required
            })
        });

        alert(`Marks saved for ${subject}`);

        document.getElementById("marks").value = "";

        loadStudents();

    }catch(err){
        alert(err.message);
    }
}


// =========================================================
// 🚀 INIT
// =========================================================
document.addEventListener("DOMContentLoaded", loadStudents);

</script>

</body>
</html>
