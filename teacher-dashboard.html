<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --primary:#4f46e5;
  --text:#e2e8f0;
}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
}

.container{display:flex}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#020617;
  height:100vh;
  padding:20px;
  position:fixed;
}

.sidebar h2{margin-bottom:20px}

.sidebar button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  background:none;
  color:white;
  text-align:left;
  cursor:pointer;
}

.sidebar button:hover{background:var(--primary)}

/* MAIN */
.main{
  margin-left:240px;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-top:20px;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:10px;
}

/* TABLE */
table{
  width:100%;
  background:var(--card);
  margin-top:10px;
  border-radius:10px;
}

th,td{padding:10px}

/* INPUT */
input,select{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
}

button.action{
  background:#4f46e5;
}

/* CHART */
canvas{
  background:var(--card);
  padding:10px;
  border-radius:10px;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>👨‍🏫 Teacher</h2>
  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('students')">Students</button>
  <button onclick="show('analytics')">Analytics</button>
  <button onclick="show('leaderboard')">Leaderboard</button>
  <button onclick="downloadReport()">Export Report</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
  <h2>Teacher Dashboard</h2>
</div>

<!-- KPI -->
<div class="cards">
  <div class="card">Total Students <h2 id="totalStudents">0</h2></div>
  <div class="card">Class Avg <h2 id="classAvg">0</h2></div>
  <div class="card">Top Score <h2 id="topScore">0</h2></div>
  <div class="card">Weak Students <h2 id="weakCount">0</h2></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<canvas id="performanceChart"></canvas>

</div>

<!-- STUDENTS -->
<div id="students" style="display:none">

<h3>Add Student</h3>
<input id="name" placeholder="Name">
<input id="roll" placeholder="Roll">
<input id="password" placeholder="Password">
<button class="action" onclick="addStudent()">Add</button>

<h3>Students List</h3>
<input id="search" placeholder="Search..." onkeyup="filterStudents()">

<table>
<thead>
<tr><th>Roll</th><th>Name</th><th>Avg</th><th>Grade</th><th>Action</th></tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<!-- ANALYTICS -->
<div id="analytics" style="display:none">
<h3>Performance Distribution</h3>
<canvas id="gradeChart"></canvas>
</div>

<!-- LEADERBOARD -->
<div id="leaderboard" style="display:none">
<h3>Top Students</h3>
<table><tbody id="leaderboardList"></tbody></table>
</div>

</div>
</div>

<script>

// AUTH
const token = localStorage.getItem("token");
if(!token) location.href="index.html";

const payload = JSON.parse(atob(token.split('.')[1]));
if(payload.role !== "teacher") location.href="index.html";

const BASE_URL = location.hostname==="localhost"
? "http://127.0.0.1:5000/api"
: "https://student-management-system-api-cznx.onrender.com/api";

async function api(url,options={}){
  const res = await fetch(url,{
    ...options,
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    }
  });
  return res.json();
}

// LOAD STUDENTS + KPI
let studentsData=[];

async function loadStudents(){
  const res = await api(`${BASE_URL}/students`);
  studentsData = res.data || [];

  const total = studentsData.length;
  const avg = (studentsData.reduce((a,b)=>a+(b.avg_marks||0),0)/total||0).toFixed(2);
  const top = Math.max(...studentsData.map(s=>s.avg_marks||0),0);
  const weak = studentsData.filter(s=>s.avg_marks<50).length;

  document.getElementById("totalStudents").innerText = total;
  document.getElementById("classAvg").innerText = avg;
  document.getElementById("topScore").innerText = top;
  document.getElementById("weakCount").innerText = weak;

  renderTable(studentsData);
  drawCharts();
}

// TABLE
function renderTable(data){
  document.getElementById("table").innerHTML =
    data.map(s=>{
      let grade="C";
      if(s.avg_marks>90) grade="A";
      else if(s.avg_marks>70) grade="B";

      return `
      <tr>
        <td>${s.rollno}</td>
        <td>${s.name}</td>
        <td>${s.avg_marks||0}</td>
        <td>${grade}</td>
        <td><button onclick="deleteStudent('${s.rollno}')">Delete</button></td>
      </tr>`;
    }).join("");
}

// FILTER
function filterStudents(){
  const val = document.getElementById("search").value.toLowerCase();
  const filtered = studentsData.filter(s=>s.name.toLowerCase().includes(val));
  renderTable(filtered);
}

// CHARTS
function drawCharts(){
  new Chart(performanceChart,{
    type:"bar",
    data:{
      labels:studentsData.map(s=>s.name),
      datasets:[{data:studentsData.map(s=>s.avg_marks)}]
    }
  });

  const A=studentsData.filter(s=>s.avg_marks>90).length;
  const B=studentsData.filter(s=>s.avg_marks>70 && s.avg_marks<=90).length;
  const C=studentsData.filter(s=>s.avg_marks<=70).length;

  new Chart(gradeChart,{
    type:"doughnut",
    data:{labels:["A","B","C"],datasets:[{data:[A,B,C]}]}
  });
}

// ADD
async function addStudent(){
  const name=document.getElementById("name").value;
  const roll=document.getElementById("roll").value;
  const password=document.getElementById("password").value;

  await api(`${BASE_URL}/students`,{
    method:"POST",
    body:JSON.stringify({name,rollno:roll,password})
  });

  loadStudents();
}

// DELETE
async function deleteStudent(roll){
  await api(`${BASE_URL}/students/${roll}`,{method:"DELETE"});
  loadStudents();
}

// LEADERBOARD
function loadLeaderboard(){
  const sorted=[...studentsData].sort((a,b)=>b.avg_marks-a.avg_marks);
  document.getElementById("leaderboardList").innerHTML =
    sorted.map((s,i)=>`
      <tr><td>#${i+1}</td><td>${s.name}</td><td>${s.avg_marks}</td></tr>
    `).join("");
}

// EXPORT PDF
function downloadReport(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("Class Report",20,20);

  studentsData.forEach((s,i)=>{
    doc.text(`${s.name} - ${s.avg_marks}`,20,30+i*10);
  });

  doc.save("class-report.pdf");
}

// NAV
function show(id){
  dashboard.style.display = id==="dashboard"?"block":"none";
  students.style.display = id==="students"?"block":"none";
  analytics.style.display = id==="analytics"?"block":"none";
  leaderboard.style.display = id==="leaderboard"?"block":"none";

  if(id==="leaderboard") loadLeaderboard();
}

// LOGOUT
function logout(){
  localStorage.clear();
  location.href="index.html";
}

// INIT
loadStudents();

</script>

</body>
</html>
