<!DOCTYPE html>
<html>
<head>
<title>Teacher Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#5f2c82,#49a09d);
    color:white;
}
.container{max-width:1200px;margin:auto;padding:20px;}
h2{text-align:center;margin-bottom:25px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;}
.card{background:rgba(255,255,255,0.12);backdrop-filter:blur(15px);border-radius:15px;padding:20px;}
.input-group{display:flex;gap:10px;flex-wrap:wrap;}
input,select{
    flex:1;
    padding:10px;
    border-radius:8px;
    border:none;
    background:rgba(255,255,255,0.2);
    color:white;
}
button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#ff4b2b;
    color:white;
    cursor:pointer;
}
button:hover{background:#ff416c;}
table{width:100%;margin-top:10px;}
th,td{padding:10px;text-align:left;}
.gradeA{color:#00ffcc;font-weight:bold;}
.gradeB{color:#ffd700;font-weight:bold;}
.gradeC{color:#ff6b6b;font-weight:bold;}
</style>
</head>

<body>

<div class="container">
<h2>👨‍🏫 Teacher Dashboard</h2>

<div class="grid">

<!-- ADD STUDENT -->
<div class="card">
<h3>➕ Add Student</h3>
<div class="input-group">
<input id="name" placeholder="Name">
<input id="roll" placeholder="Roll No">
<button onclick="addStudent()">Add</button>
</div>
</div>

<!-- SEARCH -->
<div class="card">
<h3>🔍 Search</h3>
<input id="search" placeholder="Search..." onkeyup="filterStudents()">
</div>

<!-- ATTENDANCE -->
<div class="card">
<h3>📅 Attendance</h3>
<div class="input-group">
<input type="date" id="date">
<input id="rollAtt" placeholder="Roll No">
<select id="status">
<option value="present">Present</option>
<option value="absent">Absent</option>
</select>
<button onclick="markAttendance()">Mark</button>
</div>
</div>

<!-- MARKS -->
<div class="card">
<h3>📊 Marks</h3>
<div class="input-group">
<input id="rollMarks" placeholder="Roll No">
<input id="marks" placeholder="Marks">
<button onclick="addMarks()">Save</button>
</div>
</div>

<!-- STUDENTS TABLE -->
<div class="card" style="grid-column:1/-1">
<h3>📋 Students</h3>
<table id="table">
<thead>
<tr>
<th>Roll</th>
<th>Name</th>
<th>Marks</th>
<th>Grade</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>
</div>

<!-- ✅ SCRIPT -->
<script type="module" src="./js/teacher-dashboard.js"></script>

</body>
</html>
