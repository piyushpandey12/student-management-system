<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{
  background:linear-gradient(135deg,#667eea,#764ba2,#00c6ff);
  color:#fff;
}
.container{display:flex}
.sidebar{
  width:240px;
  min-height:100vh;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  padding:20px;
}
.sidebar button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.12);
  color:#fff;
  cursor:pointer;
}
.main{flex:1;padding:25px}
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}
.card{
  padding:15px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
}
.section{
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:15px;
  margin-top:20px;
}
table{
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
}
th,td{padding:10px}
tr{background:rgba(255,255,255,0.05)}
button.action{
  background:#4f46e5;
  border:none;
  padding:10px;
  border-radius:10px;
  color:#fff;
  cursor:pointer;
}
button.delete{
  background:#ef4444;
  padding:6px;
  border-radius:8px;
  border:none;
  color:#fff;
}
input,select{
  padding:10px;
  border-radius:10px;
  margin:5px;
  border:none;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <h2>👨‍🏫 Teacher</h2>
  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('students')">Students</button>
  <button onclick="show('marks')">Marks</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">

<div class="cards">
  <div class="card">Students <h2 id="totalStudents">0</h2></div>
  <div class="card">Avg <h2 id="classAvg">0</h2></div>
  <div class="card">Top <h2 id="topScore">0</h2></div>
  <div class="card">Weak <h2 id="weakCount">0</h2></div>
</div>

<div id="dashboard" class="section">
  <canvas id="performanceChart"></canvas>
</div>

<div id="students" class="section" style="display:none">
<h3>Add Student</h3>
<input id="name" placeholder="Name">
<input id="roll" placeholder="ID">
<input id="password" placeholder="Password">
<button class="action" onclick="addStudent()">Add</button>

<table>
<thead>
<tr><th>ID</th><th>Name</th><th>Avg</th><th>Action</th></tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<div id="marks" class="section" style="display:none">
<h3>Manage Marks</h3>
<select id="studentSelect"></select>
<div id="marksForm"></div>
<button class="action" onclick="saveMarks()">Save Marks</button>
<canvas id="subjectChart"></canvas>
</div>

</div>
</div>

<script>

// ================= CONFIG =================
const SUBJECTS = [
"Big Data Analytics","Cloud Computing","Machine Learning",
"Information Security","Mobile Application Development"
];

const token = localStorage.getItem("token");
if(!token) location.href="index.html";

const BASE_URL =
  location.hostname==="localhost"
  ? "http://127.0.0.1:5000/api"
  : "https://student-management-system-api-cznx.onrender.com/api";

// ================= API =================
async function api(url, options={}) {
  try {
    const res = await fetch(url,{
      ...options,
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+token
      }
    });

    const data = await res.json();
    console.log("API:", url, data);

    if(!res.ok) throw new Error(data.message || "Error");

    return data;

  } catch(e) {
    alert(e.message);
    return {};
  }
}

// ================= LOAD =================
let studentsData=[];

async function loadStudents(){

  const res = await api(`${BASE_URL}/students`);
  studentsData = res.data || [];

  totalStudents.innerText = studentsData.length;

  const avg = studentsData.reduce((a,b)=>a+(b.avg_marks||0),0)/(studentsData.length||1);
  classAvg.innerText = avg.toFixed(2);

  topScore.innerText = Math.max(...studentsData.map(s=>s.avg_marks||0),0);
  weakCount.innerText = studentsData.filter(s=>(s.avg_marks||0)<40).length;

  renderTable();

  const select = document.getElementById("studentSelect");

  if(studentsData.length===0){
    select.innerHTML = `<option>No students</option>`;
    return;
  }

  select.innerHTML = studentsData.map(s =>
    `<option value="${s.rollno}">${s.name} (${s.rollno})</option>`
  ).join("");

  select.value = studentsData[0].rollno;

  renderMarksForm();
}

// ================= TABLE =================
function renderTable(){
  table.innerHTML = studentsData.map(s=>`
    <tr>
      <td>${s.rollno}</td>
      <td>${s.name}</td>
      <td>${s.avg_marks||0}</td>
      <td><button class="delete" onclick="deleteStudent('${s.rollno}')">Delete</button></td>
    </tr>
  `).join("");
}

// ================= ADD STUDENT (FINAL FIX) =================
async function addStudent(){

  const name = document.getElementById("name").value.trim();
  const roll = document.getElementById("roll").value.trim();
  const password = document.getElementById("password").value.trim();

  console.log("SENDING:", { name, rollno: roll, password });

  if(!name || !roll || !password){
    return alert("⚠️ Fill all fields");
  }

  try {

    const res = await fetch(`${BASE_URL}/students`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+token
      },
      body:JSON.stringify({
        name,
        rollno: roll,   // ✅ FINAL CORRECT KEY
        password
      })
    });

    const data = await res.json();
    console.log("RESPONSE:", data);

    if(!res.ok){
      throw new Error(data.message || "Failed");
    }

    alert("✅ Student added successfully");

    document.getElementById("name").value="";
    document.getElementById("roll").value="";
    document.getElementById("password").value="";

    loadStudents();

  } catch(err){
    console.error(err);
    alert("❌ " + err.message);
  }
}

// ================= DELETE =================
async function deleteStudent(id){
  if(!confirm("Delete?")) return;
  await api(`${BASE_URL}/students/${id}`,{method:"DELETE"});
  loadStudents();
}

// ================= MARKS =================
function renderMarksForm(){
  marksForm.innerHTML = SUBJECTS.map(sub=>`
    <div>${sub}<input type="number" id="mark_${sub}"></div>
  `).join("");
}

async function saveMarks(){

  const id = studentSelect.value;

  if(!id) return alert("Select student");

  const marks = SUBJECTS.map(sub=>({
    subject:sub,
    marks:Number(document.getElementById(`mark_${sub}`).value||0)
  }));

  await api(`${BASE_URL}/marks/${id}`,{
    method:"POST",
    body:JSON.stringify({ marks }) // ✅ backend usually doesn't need identifier here
  });

  alert("✅ Marks saved");
}

// ================= NAV =================
function show(id){
  dashboard.style.display=id==="dashboard"?"block":"none";
  students.style.display=id==="students"?"block":"none";
  marks.style.display=id==="marks"?"block":"none";
}

// ================= LOGOUT =================
function logout(){
  localStorage.clear();
  location.href="index.html";
}

// ================= INIT =================
loadStudents();

</script>

</body>
</html>
