<!DOCTYPE html>
<html>
<head>
<title>Teacher Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#5f2c82,#49a09d);
    color:white;
}
.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}
h2{text-align:center;margin-bottom:25px;}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}
.card{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    border-radius:15px;
    padding:20px;
}
.input-group{
    display:flex;
    gap:10px;
}
.input-group input{
    flex:1;
    padding:10px;
    border-radius:8px;
    border:none;
    background:rgba(255,255,255,0.2);
    color:white;
}
button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#ff4b2b;
    color:white;
    cursor:pointer;
}
table{
    width:100%;
    margin-top:10px;
}
.gradeA{color:#00ffcc;}
.gradeB{color:#ffd700;}
.gradeC{color:#ff6b6b;}
</style>
</head>

<body>

<div class="container">
<h2>👨‍🏫 Teacher Dashboard</h2>

<div class="grid">

<!-- ADD STUDENT -->
<div class="card">
<h3>➕ Add Student</h3>
<div class="input-group">
<input id="name" placeholder="Name">
<input id="rollno" placeholder="Roll No">
<button onclick="addStudent()">Add</button>
</div>
</div>

<!-- SEARCH -->
<div class="card">
<h3>🔍 Search</h3>
<input id="search" placeholder="Search..." onkeyup="filterStudents()">
</div>

<!-- TABLE -->
<div class="card" style="grid-column:1/-1">
<h3>📋 Students</h3>

<table id="table">
<thead>
<tr>
<th>Roll</th>
<th>Name</th>
<th>Marks</th>
<th>Grade</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

</div>
</div>

<script>

// ================= CONFIG =================
const BASE_URL = "https://student-management-system-api-cznx.onrender.com/api";
const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "teacher-login.html";
}

function getHeaders() {
    return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
    };
}

// ================= RESPONSE =================
async function handleResponse(res) {
    const text = await res.text();

    let data;
    try {
        data = JSON.parse(text);
    } catch {
        throw new Error("Server error → " + text);
    }

    if (!res.ok) {
        throw new Error(data.message || data.error || "Request failed");
    }

    return data;
}

// ================= ADD STUDENT =================
async function addStudent() {
    const name = document.getElementById("name").value.trim();
    const rollno = document.getElementById("rollno").value.trim().toLowerCase();

    if (!name || !rollno) {
        alert("Enter name & roll");
        return;
    }

    try {
        const res = await fetch(`${BASE_URL}/students/`, {
            method: "POST",
            headers: getHeaders(),
            body: JSON.stringify({ name, rollno })
        });

        await handleResponse(res);

        alert("✅ Student added");
        loadStudents();

    } catch (err) {
        console.error("ERROR:", err);
        alert("❌ " + err.message);
    }
}

// ================= DELETE =================
async function deleteStudent(rollno) {
    if (!confirm("Delete student?")) return;

    try {
        const res = await fetch(`${BASE_URL}/students/${rollno}`, {
            method: "DELETE",
            headers: getHeaders()
        });

        await handleResponse(res);

        alert("✅ Deleted");
        loadStudents();

    } catch (err) {
        console.error(err);
        alert("❌ " + err.message);
    }
}

// ================= LOAD =================
async function loadStudents() {
    try {
        const res = await fetch(`${BASE_URL}/students/`, {
            headers: getHeaders()
        });

        const data = await handleResponse(res);
        const students = data.data || [];

        let html = "";

        students.forEach(s => {
            let grade = "C";
            if (s.avg_marks > 90) grade = "A";
            else if (s.avg_marks > 70) grade = "B";

            html += `
            <tr>
                <td>${s.rollno}</td>
                <td>${s.name}</td>
                <td>${s.avg_marks || 0}</td>
                <td class="${grade === 'A' ? 'gradeA' : grade === 'B' ? 'gradeB' : 'gradeC'}">${grade}</td>
                <td><button onclick="deleteStudent('${s.rollno}')">Delete</button></td>
            </tr>`;
        });

        document.querySelector("#table tbody").innerHTML = html;

    } catch (err) {
        console.error(err);
        alert("❌ " + err.message);
    }
}

// ================= SEARCH =================
function filterStudents() {
    const input = document.getElementById("search").value.toLowerCase();

    document.querySelectorAll("#table tbody tr").forEach(row => {
        row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
    });
}

// INIT
loadStudents();

</script>

</body>
</html>
