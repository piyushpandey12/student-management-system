<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
  background:linear-gradient(135deg,#667eea,#764ba2,#00c6ff);
  color:#fff;
}

.container{display:flex}

/* SIDEBAR */
.sidebar{
  width:240px;
  min-height:100vh;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  padding:20px;
}

.sidebar h2{margin-bottom:15px}

.sidebar button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.12);
  color:#fff;
  cursor:pointer;
}

/* MAIN */
.main{flex:1;padding:25px}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-top:20px;
}

.card{
  padding:15px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
}

/* SECTION */
.section{
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:15px;
  margin-top:20px;
}

/* TABLE */
table{
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
}

th,td{padding:10px}

th{
  background:rgba(255,255,255,0.2);
}

tr{
  background:rgba(255,255,255,0.05);
}

/* INPUT */
input{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
}

/* BUTTON */
button.action{
  background:#4f46e5;
  color:#fff;
}

/* CHART */
canvas{
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:15px;
  margin-top:20px;
}

/* RESPONSIVE */
@media(max-width:768px){
  .container{flex-direction:column}
  .sidebar{width:100%;display:flex;gap:10px}
  .cards{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>👨‍🏫 Teacher</h2>
  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('students')">Students</button>
  <button onclick="show('analytics')">Analytics</button>
  <button onclick="show('leaderboard')">Leaderboard</button>
  <button onclick="downloadReport()">Export</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
  <h2>Teacher Dashboard</h2>
</div>

<!-- KPI -->
<div class="cards">
  <div class="card"><p>Total Students</p><h2 id="totalStudents">0</h2></div>
  <div class="card"><p>Class Avg</p><h2 id="classAvg">0</h2></div>
  <div class="card"><p>Top Score</p><h2 id="topScore">0</h2></div>
  <div class="card"><p>Weak Students</p><h2 id="weakCount">0</h2></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
  <h3>Performance Overview</h3>
  <canvas id="performanceChart"></canvas>
</div>

<!-- STUDENTS -->
<div id="students" class="section" style="display:none">

<h3>Add Student</h3>
<input id="name" placeholder="Name">
<input id="roll" placeholder="Roll">
<input id="password" placeholder="Password">
<button class="action" onclick="addStudent()">Add</button>

<h3>Students List</h3>
<input id="search" placeholder="Search..." onkeyup="filterStudents()">

<table>
<thead>
<tr><th>Roll</th><th>Name</th><th>Avg</th><th>Grade</th><th>Action</th></tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<!-- ANALYTICS -->
<div id="analytics" class="section" style="display:none">
<h3>Performance Distribution</h3>
<canvas id="gradeChart"></canvas>
</div>

<!-- LEADERBOARD -->
<div id="leaderboard" class="section" style="display:none">
<h3>Top Students</h3>
<table><tbody id="leaderboardList"></tbody></table>
</div>

</div>
</div>

<script>

// AUTH
const token = localStorage.getItem("token");
if(!token) location.href="index.html";

const payload = JSON.parse(atob(token.split('.')[1]));
if(payload.role !== "teacher") location.href="index.html";

const BASE_URL = location.hostname==="localhost"
? "http://127.0.0.1:5000/api"
: "https://student-management-system-api-cznx.onrender.com/api";

async function api(url,options={}){
  const res = await fetch(url,{
    ...options,
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    }
  });
  return res.json();
}

// DATA
let studentsData=[];

async function loadStudents(){
  const res = await api(`${BASE_URL}/students`);
  studentsData = res.data || [];

  const total = studentsData.length;
  const avg = (studentsData.reduce((a,b)=>a+(b.avg_marks||0),0)/total||0).toFixed(2);
  const top = Math.max(...studentsData.map(s=>s.avg_marks||0),0);
  const weak = studentsData.filter(s=>s.avg_marks<50).length;

  totalStudents.innerText = total;
  classAvg.innerText = avg;
  topScore.innerText = top;
  weakCount.innerText = weak;

  renderTable(studentsData);
  drawCharts();
}

// TABLE
function renderTable(data){
  table.innerHTML = data.map(s=>{
    let grade="C";
    if(s.avg_marks>90) grade="A";
    else if(s.avg_marks>70) grade="B";

    return `
    <tr>
      <td>${s.rollno}</td>
      <td>${s.name}</td>
      <td>${s.avg_marks||0}</td>
      <td>${grade}</td>
      <td><button onclick="deleteStudent('${s.rollno}')">Delete</button></td>
    </tr>`;
  }).join("");
}

// FILTER
function filterStudents(){
  const val = search.value.toLowerCase();
  const filtered = studentsData.filter(s=>s.name.toLowerCase().includes(val));
  renderTable(filtered);
}

// CHARTS
let perfChart, gradeChartObj;

function drawCharts(){

  if(perfChart) perfChart.destroy();
  if(gradeChartObj) gradeChartObj.destroy();

  perfChart = new Chart(performanceChart,{
    type:"bar",
    data:{
      labels:studentsData.map(s=>s.name),
      datasets:[{data:studentsData.map(s=>s.avg_marks)}]
    }
  });

  const A=studentsData.filter(s=>s.avg_marks>90).length;
  const B=studentsData.filter(s=>s.avg_marks>70 && s.avg_marks<=90).length;
  const C=studentsData.filter(s=>s.avg_marks<=70).length;

  gradeChartObj = new Chart(gradeChart,{
    type:"doughnut",
    data:{labels:["A","B","C"],datasets:[{data:[A,B,C]}]}
  });
}

// ADD
async function addStudent(){
  await api(`${BASE_URL}/students`,{
    method:"POST",
    body:JSON.stringify({
      name:name.value,
      rollno:roll.value,
      password:password.value
    })
  });
  loadStudents();
}

// DELETE
async function deleteStudent(roll){
  await api(`${BASE_URL}/students/${roll}`,{method:"DELETE"});
  loadStudents();
}

// LEADERBOARD
function loadLeaderboard(){
  const sorted=[...studentsData].sort((a,b)=>b.avg_marks-a.avg_marks);
  leaderboardList.innerHTML =
    sorted.map((s,i)=>`
      <tr><td>#${i+1}</td><td>${s.name}</td><td>${s.avg_marks}</td></tr>
    `).join("");
}

// EXPORT
function downloadReport(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.text("Class Report",20,20);

  studentsData.forEach((s,i)=>{
    doc.text(`${s.name} - ${s.avg_marks}`,20,30+i*10);
  });

  doc.save("report.pdf");
}

// NAV
function show(id){
  dashboard.style.display = id==="dashboard"?"block":"none";
  students.style.display = id==="students"?"block":"none";
  analytics.style.display = id==="analytics"?"block":"none";
  leaderboard.style.display = id==="leaderboard"?"block":"none";

  if(id==="leaderboard") loadLeaderboard();
}

// LOGOUT
function logout(){
  localStorage.clear();
  location.href="index.html";
}

// INIT
loadStudents();

</script>

</body>
</html>
